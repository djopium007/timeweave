<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Map</title>
<style>
  :root{
    --bg:#0a0c10; --panel:#11151c; --panel2:#161b24; --line:#222a36;
    --accent:#ff2a1f; --cyan:#28d7e0; --amber:#ffb02e; --green:#39d98a; --purple:#b07cff;
    --txt:#e7ecf3; --muted:#8b97a8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1100px 600px at 80% -10%, color-mix(in srgb, var(--accent) 16%, transparent) 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #06121a 0%, transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:"Segoe UI",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:28px 22px 80px}
  header.hero{
    border:1px solid var(--line);border-radius:16px;padding:30px 30px 26px;position:relative;overflow:hidden;
    background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent 60%), var(--panel);
  }
  header.hero::after{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(90deg, transparent 0 38px, rgba(255,255,255,.012) 38px 39px);pointer-events:none}
  .eyebrow{letter-spacing:.34em;font-size:11px;color:var(--accent);text-transform:uppercase;font-weight:700}
  h1{font-size:38px;margin:8px 0 6px;font-weight:800;letter-spacing:-.5px;line-height:1.05}
  h1 .glow{color:var(--accent);text-shadow:0 0 22px color-mix(in srgb, var(--accent) 55%, transparent)}
  .sub{color:var(--muted);max-width:780px;font-size:15px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:20px}
  .legend .chip{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .dot{width:12px;height:12px;border-radius:3px;display:inline-block}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:26px 0 8px}
  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:9px 15px;border-radius:999px;
    cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:#fff}
  .btn.active{background:var(--accent);border-color:var(--accent);color:#fff;
    box-shadow:0 0 18px color-mix(in srgb, var(--accent) 40%, transparent)}

  .rail{display:flex;flex-direction:column;margin-top:20px}
  .branch{border:1px solid var(--line);border-radius:14px;margin-bottom:22px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--panel2));transition:.2s}
  .branch.dim{opacity:.32;filter:saturate(.4)}
  .branch-head{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;border-left:5px solid var(--bcol,var(--accent))}
  .branch-head .bt{flex:1}
  .branch-head h2{margin:0;font-size:19px;font-weight:700}
  .branch-head .meta{font-size:12.5px;color:var(--muted);margin-top:2px}
  .branch-films{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.4;max-width:38%}
  .branch-body{padding:0 20px 8px}
  .caret{color:var(--muted);font-size:13px;transition:.2s}
  .branch.collapsed .branch-body{display:none}
  .branch.collapsed .caret{transform:rotate(-90deg)}

  .track{position:relative;margin:8px 0 18px;padding-left:26px}
  .track::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(180deg,var(--bcol),transparent);opacity:.6}
  .node{position:relative;margin:0 0 14px;padding:0 0 0 4px}
  .node::before{content:"";position:absolute;left:-21px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--bg);border:2px solid var(--bcol)}
  .node.turning-point::before{background:var(--bcol)}
  .node.paradox::before{border-color:var(--purple);box-shadow:0 0 10px color-mix(in srgb,var(--purple) 60%,transparent)}
  .node.death::before{border-color:var(--accent);background:var(--accent)}
  .node.resolution::before{border-color:var(--green);background:var(--green)}
  .node .yr{font-size:12px;font-weight:800;color:var(--bcol);letter-spacing:.04em}
  .node .ev{font-size:14px;color:var(--txt)}
  .node .ev b{color:#fff}
  .tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
    padding:1px 7px;border-radius:5px;margin-left:6px;vertical-align:middle;border:1px solid transparent}
  .tag.paradox{background:rgba(176,124,255,.16);color:var(--purple);border-color:rgba(176,124,255,.4)}
  .tag.event{background:rgba(255,42,31,.16);color:#ff6a5f;border-color:rgba(255,42,31,.4)}
  .tag.model{background:rgba(40,215,224,.14);color:var(--cyan);border-color:rgba(40,215,224,.35)}
  .tag.faction{background:rgba(57,217,138,.14);color:var(--green);border-color:rgba(57,217,138,.35)}
  .tag.character{background:rgba(255,176,46,.14);color:var(--amber);border-color:rgba(255,176,46,.35)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:34px}
  @media(max-width:880px){.grid2{grid-template-columns:1fr}.branch-films{display:none}}
  .card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:20px 22px}
  .card h3{margin:0 0 14px;font-size:16px;display:flex;align-items:center;gap:9px}
  .card h3 .bar{width:4px;height:18px;border-radius:2px;background:var(--accent)}
  .chars{display:flex;flex-direction:column;gap:9px}
  .char{display:flex;gap:12px;align-items:flex-start;padding:10px;border-radius:10px;background:var(--panel2);border:1px solid transparent;transition:.15s}
  .char:hover{border-color:var(--line)}
  .av{width:40px;height:40px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0a0c10}
  .char .nm{font-weight:700;font-size:14px}
  .char .rl{font-size:12.5px;color:var(--muted)}
  .models{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.models{grid-template-columns:1fr}}
  .model{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--panel2)}
  .model .mn{font-weight:800;font-size:14px;color:var(--cyan)}
  .model .md{font-size:12px;color:var(--muted);margin-top:3px}
  .para-box{border:1px solid rgba(176,124,255,.35);border-radius:14px;background:rgba(176,124,255,.05);padding:20px 22px;margin-top:34px}
  .para-box h3{color:var(--purple)}
  .para-item{padding:10px 0;border-top:1px solid rgba(176,124,255,.15)}
  .para-item:first-of-type{border-top:none}
  .para-item b{color:#fff}
  footer{margin-top:46px;border-top:1px solid var(--line);padding-top:18px;color:var(--muted);font-size:12.5px}
  .hide{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="eyebrow" id="eyebrow"></div>
    <h1 id="title"></h1>
    <p class="sub" id="intro"></p>
    <div class="legend">
      <span class="chip"><span class="dot" style="background:var(--accent)"></span>Turning point / catastrophe</span>
      <span class="chip"><span class="dot" style="background:var(--purple)"></span>Time-travel paradox</span>
      <span class="chip"><span class="dot" style="background:var(--cyan)"></span>Machine / tech</span>
      <span class="chip"><span class="dot" style="background:var(--green)"></span>Faction / resolution</span>
    </div>
  </header>

  <div class="controls" id="controls"></div>
  <div class="rail" id="rail"></div>

  <div class="grid2">
    <div class="card" id="charsCard"><h3><span class="bar"></span>Key Characters</h3><div class="chars" id="chars"></div></div>
    <div class="card" id="itemsCard"><h3><span class="bar"></span>Key Items &amp; Tech</h3><div class="models" id="models"></div></div>
  </div>

  <div class="para-box" id="themesBox">
    <h3><span class="bar" style="background:var(--purple)"></span>Recurring Themes &amp; Paradoxes</h3>
    <div id="paras"></div>
  </div>

  <footer id="footer"></footer>
  <div style="display:flex;justify-content:center;margin:30px 0 44px;">
    <a href="https://buymeacoffee.com/reelorder" target="_blank" rel="noopener noreferrer" title="Support RealOrder" aria-label="Buy me a coffee" style="display:inline-flex;align-items:center;gap:9px;background:#FFDD00;color:#14130C;border:1px solid rgba(0,0,0,0.12);border-radius:999px;padding:9px 16px 9px 13px;font-family:inherit;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;box-shadow:0 2px 14px rgba(247,196,0,0.35);">
      <svg width="18" height="18" viewBox="0 0 26 26" fill="none" stroke="#14130C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 4 Q9.5 2.5 9 1"/><path d="M13 4 Q13.5 2.5 13 1"/><path d="M17 4 Q17.5 2.5 17 1"/><path d="M6 7 H20 L18.5 19 Q18.2 21 16 21 H10 Q7.8 21 7.5 19 Z"/><path d="M20 10 Q24 10 24 13.5 Q24 17 20 17"/><path d="M4 22 H22"/></svg>
      Buy me a coffee
    </a>
  </div>
</div>

<script>
const DATA = {
  "franchise": "Back to the Future",
  "tagline": "Three films, one DeLorean, and a timeline overwritten so many times even Doc needs a whiteboard.",
  "intro": "The Back to the Future trilogy isn't a branching multiverse so much as a single timeline that keeps getting erased and rewritten. Each trip to the past overwrites the present the travelers came from, so the 'branches' here are the successive realities Marty and Doc create: the world before any time travel, the improved 1985 that Marty's first trip produces, the dystopian 'Hell Valley' that Old Biff's stolen almanac spawns, and the restored timeline that the 1885 adventure finally locks in. Read them top to bottom as a chain of overwrites, not as parallel worlds.",
  "accent": "#5ad1ff",
  "films": [
    {
      "title": "Back to the Future",
      "year": 1985
    },
    {
      "title": "Back to the Future Part II",
      "year": 1989
    },
    {
      "title": "Back to the Future Part III",
      "year": 1990
    }
  ],
  "branches": [
    {
      "id": "b1",
      "title": "The Original Timeline",
      "color": "#ff5e5e",
      "films": [
        "Back to the Future",
        "Back to the Future Part III"
      ],
      "summary": "The world before Marty and Doc ever touch the past: a timid McFly family, a fatal 1885, and a Doc who dies in a parking lot.",
      "nodes": [
        {
          "era": "1885",
          "type": "death",
          "text": "New schoolteacher <b>Clara Clayton<\/b> arrives in Hill Valley; a snake spooks her horses and she plunges into Shonash Ravine and dies, never reaching her post. The gorge is renamed <b>Clayton Ravine<\/b> in her memory.",
          "tags": [
            {
              "label": "Clara Clayton",
              "kind": "character"
            }
          ]
        },
        {
          "era": "Fall 1955",
          "type": "event",
          "text": "A teenage <b>George McFly<\/b> spies on his crush <b>Lorraine Baines<\/b> from a tree, falls into the road, and is hit by Lorraine's father's car. Pitied into their home, George wins Lorraine, and they kiss at the Enchantment Under the Sea dance.",
          "tags": [
            {
              "label": "George & Lorraine",
              "kind": "character"
            }
          ]
        },
        {
          "era": "Nov 5, 1955",
          "type": "turning-point",
          "text": "<b>Doc Brown<\/b> slips hanging a clock, bangs his head, and envisions the <b>flux capacitor<\/b> — the device that makes time travel possible.",
          "tags": [
            {
              "label": "Flux Capacitor",
              "kind": "model"
            }
          ]
        },
        {
          "era": "1985",
          "type": "event",
          "text": "The McFlys are downtrodden: George is bullied by his boss <b>Biff Tannen<\/b>, Lorraine is unhappy, and 17-year-old <b>Marty<\/b> dreams of rock stardom while best friend Doc finally perfects the DeLorean time machine.",
          "tags": [
            {
              "label": "DeLorean",
              "kind": "model"
            }
          ]
        },
        {
          "era": "Oct 26, 1985",
          "type": "death",
          "text": "Doc test-runs the time machine at <b>Twin Pines Mall<\/b> using plutonium swindled from Libyan terrorists, who arrive and shoot him dead. Fleeing, Marty accidentally drives the DeLorean back to 1955.",
          "tags": [
            {
              "label": "Doc killed",
              "kind": "event"
            }
          ]
        }
      ]
    },
    {
      "id": "b2",
      "title": "The Improved 1985 (Lone Pine)",
      "color": "#ffb02e",
      "films": [
        "Back to the Future"
      ],
      "summary": "Marty's 1955 trip accidentally rewrites his own family into a happier, more confident version — and saves Doc.",
      "nodes": [
        {
          "era": "Nov 1955",
          "type": "paradox",
          "text": "Marty crashes into a farmer's pine tree on arrival and, in town, takes the car hit meant for George — so <b>Lorraine falls for Marty<\/b> (alias 'Calvin Klein') instead of his father, threatening to erase Marty from existence.",
          "tags": [
            {
              "label": "Erasure paradox",
              "kind": "paradox"
            }
          ]
        },
        {
          "era": "Nov 1955",
          "type": "event",
          "text": "Marty plants the idea for George's future sci-fi novel and gives <b>Chuck Berry<\/b>'s cousin an early earful of 'Johnny B. Goode' — three years before it was written in the original timeline.",
          "tags": [
            {
              "label": "Bootstrap song",
              "kind": "paradox"
            }
          ]
        },
        {
          "era": "Nov 12, 1955",
          "type": "turning-point",
          "text": "At the Enchantment Under the Sea dance, <b>George stands up to Biff<\/b> and kisses Lorraine, securing his children's existence. Marty harnesses the clock-tower lightning strike to power his return to 1985.",
          "tags": [
            {
              "label": "Turning point",
              "kind": "event"
            }
          ]
        },
        {
          "era": "Oct 26, 1985",
          "type": "resolution",
          "text": "Marty returns to a <b>Lone Pine Mall<\/b> (he flattened one of the twin pines) and a far better family: George is a published novelist, Biff details their cars, and Doc survives the Libyans by secretly wearing a bulletproof vest after taping back together Marty's warning letter.",
          "tags": [
            {
              "label": "Doc survives",
              "kind": "character"
            }
          ]
        }
      ]
    },
    {
      "id": "b3",
      "title": "Biff's Dystopia — Hell Valley (1985-A)",
      "color": "#b07cff",
      "films": [
        "Back to the Future Part II"
      ],
      "summary": "A 2015 detour lets Old Biff hand his teenage self a sports almanac, spawning a corrupt alternate 1985 where Biff rules Hill Valley.",
      "nodes": [
        {
          "era": "Oct 21, 2015",
          "type": "event",
          "text": "Doc brings Marty and Jennifer forward to stop their future kids from a botched robbery with <b>Griff Tannen<\/b>. Marty buys a <b>Grays Sports Almanac<\/b> of results from 1950–2000; Doc makes him toss it.",
          "tags": [
            {
              "label": "Sports Almanac",
              "kind": "model"
            }
          ]
        },
        {
          "era": "Oct 21, 2015",
          "type": "turning-point",
          "text": "<b>Old Biff<\/b> recognizes the flying DeLorean as a time machine, swipes the discarded almanac, and steals the car to deliver his fortune-making secret to the past.",
          "tags": [
            {
              "label": "Old Biff steals it",
              "kind": "paradox"
            }
          ]
        },
        {
          "era": "Nov 12, 1955",
          "type": "paradox",
          "text": "Old Biff gives the almanac to his teenage self, telling him to keep it hidden and to kill anyone — a kid or a 'wild-eyed old man' — who comes asking about it. This seeds the dystopian branch.",
          "tags": [
            {
              "label": "Bootstrap gift",
              "kind": "paradox"
            }
          ]
        },
        {
          "era": "1985-A",
          "type": "death",
          "text": "Almanac-rich <b>Biff<\/b> builds BiffCo and a casino, murders <b>George McFly<\/b>, forces a marriage to Lorraine, and turns Hill Valley into a crime-ridden 'Hell Valley.' The committed Doc-D and a dead George greet the returning travelers.",
          "tags": [
            {
              "label": "George murdered",
              "kind": "event"
            }
          ]
        }
      ]
    },
    {
      "id": "b4",
      "title": "The Restored Timeline (Eastwood Ravine)",
      "color": "#39d98a",
      "films": [
        "Back to the Future Part II",
        "Back to the Future Part III"
      ],
      "summary": "Marty and Doc burn the almanac, then untangle an 1885 detour that ends with Doc choosing love and the timeline finally secured.",
      "nodes": [
        {
          "era": "Nov 12, 1955",
          "type": "turning-point",
          "text": "Re-entering 1955 alongside their first-movie selves, Marty and Doc chase the almanac through a car crash and finally <b>burn it<\/b>, restoring Biff to a harmless auto-detailer — but lightning then strikes the DeLorean and hurls Doc back to 1885.",
          "tags": [
            {
              "label": "Almanac burned",
              "kind": "event"
            }
          ]
        },
        {
          "era": "1885",
          "type": "event",
          "text": "Stranded with fried time circuits, <b>Doc becomes a blacksmith<\/b>, hides the DeLorean in a mineshaft, and mails Marty fix-it instructions plus an order not to come back for him.",
          "tags": [
            {
              "label": "Doc stranded",
              "kind": "character"
            }
          ]
        },
        {
          "era": "1885",
          "type": "turning-point",
          "text": "Doc saves <b>Clara Clayton<\/b> from her fatal fall and they fall in love — rewriting the ravine's history. Marty, defying the letter, drives back to 1885 to rescue Doc from being shot by <b>Buford 'Mad Dog' Tannen<\/b>.",
          "tags": [
            {
              "label": "Clara saved",
              "kind": "character"
            }
          ]
        },
        {
          "era": "1885",
          "type": "turning-point",
          "text": "Marty out-duels Mad Dog Tannen; he and Doc hijack a locomotive to push the fuel-less DeLorean to 88 mph. Doc leaps off to save Clara, and Marty rockets home alone.",
          "tags": [
            {
              "label": "Train push",
              "kind": "model"
            }
          ]
        },
        {
          "era": "Oct 27, 1985",
          "type": "resolution",
          "text": "Marty returns for good to a timeline like the one he wanted — now with <b>Eastwood Ravine<\/b> — avoids the car crash that would have wrecked his music career, and watches Doc return in a flying steam-train time machine with Clara and sons <b>Jules and Verne<\/b>.",
          "tags": [
            {
              "label": "Timeline secured",
              "kind": "event"
            }
          ]
        }
      ]
    }
  ],
  "characters": [
    {
      "name": "Marty McFly",
      "role": "The teen who keeps accidentally rewriting his own family while trying to get home.",
      "color": "#5ad1ff"
    },
    {
      "name": "Doc Brown",
      "role": "Inventor of the flux capacitor; dies, survives, gets stranded in 1885, and ends up married to Clara.",
      "color": "#ffb02e"
    },
    {
      "name": "George McFly",
      "role": "Timid father turned confident novelist — and, in Biff's dystopia, a murder victim.",
      "color": "#39d98a"
    },
    {
      "name": "Lorraine Baines",
      "role": "Marty's mother, whose 1955 affections nearly erase him from existence.",
      "color": "#ff8fb0"
    },
    {
      "name": "Biff Tannen",
      "role": "Bully across generations; the almanac briefly makes him king of Hell Valley.",
      "color": "#b07cff"
    },
    {
      "name": "Clara Clayton",
      "role": "The schoolteacher fated to die in the ravine until Doc saves her in the restored timeline.",
      "color": "#ff5e5e"
    },
    {
      "name": "Buford 'Mad Dog' Tannen",
      "role": "Biff's 1885 ancestor; the gunslinger who shoots Doc in the original 1885.",
      "color": "#c98a5a"
    }
  ],
  "items": [
    {
      "name": "DeLorean DMC-12",
      "desc": "Doc's time machine; needs 1.21 gigawatts and 88 mph to jump."
    },
    {
      "name": "Flux Capacitor",
      "desc": "The Y-shaped device, glimpsed in Doc's 1955 vision, that makes time travel possible."
    },
    {
      "name": "Grays Sports Almanac",
      "desc": "1950–2000 results book; Old Biff's gift that creates the dystopian timeline."
    },
    {
      "name": "Mr. Fusion",
      "desc": "Home reactor retrofit that lets the DeLorean run on garbage instead of plutonium."
    },
    {
      "name": "Hover Conversion",
      "desc": "2015 upgrade that lets the DeLorean — and later a steam train — fly."
    }
  ],
  "themes": [
    "<b>Overwrite, not parallel:<\/b> each trip erases the present the travelers left, so the 'branches' are a chain of successive realities, not coexisting worlds.",
    "<b>The bootstrap loop of Johnny B. Goode:<\/b> Marty learns the song from Chuck Berry, then plays it for Berry to copy — the tune has no original author.",
    "<b>The almanac paradox:<\/b> Old Biff uses future knowledge to enrich his past self, spawning a timeline whose Biff could only exist because the almanac arrived from a future that the new timeline rewrites.",
    "<b>A ravine renamed three times:<\/b> Clayton (Clara dies) → Shonash (its older name) → Eastwood (Marty's fake death) traces the timeline's edits in a single landmark.",
    "<b>'No one's future is written':<\/b> Doc's closing creed — the films treat time as endlessly editable rather than fixed."
  ]
};

const esc = s => String(s==null?'':s);
document.documentElement.style.setProperty('--accent', DATA.accent || '#ff2a1f');
document.title = (DATA.franchise || 'Timeline') + ' — Timeline Map';
document.getElementById('eyebrow').textContent = (DATA.films && DATA.films.length)
  ? `${DATA.films.length} films · ${(DATA.branches||[]).length} branches`
  : 'Interactive timeline';
document.getElementById('title').innerHTML = `<span class="glow">${esc(DATA.franchise)}</span> — Timeline`;
document.getElementById('intro').textContent = esc(DATA.tagline ? DATA.tagline + ' ' : '') + esc(DATA.intro||'');

// controls
const controls = document.getElementById('controls');
controls.innerHTML = `<button class="btn active" data-f="all">All branches</button>` +
  (DATA.branches||[]).map(b=>`<button class="btn" data-f="${b.id}">${esc(b.title)}</button>`).join('');

// branches
const rail = document.getElementById('rail');
(DATA.branches||[]).forEach(b=>{
  const el = document.createElement('div');
  el.className='branch'; el.dataset.id=b.id; el.style.setProperty('--bcol', b.color||DATA.accent||'#ff2a1f');
  el.innerHTML = `
    <div class="branch-head" style="--bcol:${b.color||'#ff2a1f'}">
      <span class="caret">▼</span>
      <div class="bt"><h2>${esc(b.title)}</h2><div class="meta">${esc(b.summary||'')}</div></div>
      <div class="branch-films">${(b.films||[]).map(esc).join(' · ')}</div>
    </div>
    <div class="branch-body"><div class="track">
      ${(b.nodes||[]).map(n=>`
        <div class="node ${esc(n.type||'event')}">
          <div class="yr">${esc(n.era)}</div>
          <div class="ev">${n.text||''}${(n.tags||[]).map(t=>`<span class="tag ${esc(t.kind||'event')}">${esc(t.label)}</span>`).join('')}</div>
        </div>`).join('')}
    </div></div>`;
  el.querySelector('.branch-head').addEventListener('click',()=>el.classList.toggle('collapsed'));
  rail.appendChild(el);
});

// characters
const chars = document.getElementById('chars');
if(DATA.characters && DATA.characters.length){
  DATA.characters.forEach(c=>{
    const initials = String(c.name||'?').split(/[\s\/]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
    chars.insertAdjacentHTML('beforeend',
      `<div class="char"><div class="av" style="background:${c.color||DATA.accent||'#ff2a1f'}">${initials}</div>
       <div><div class="nm">${esc(c.name)}</div><div class="rl">${esc(c.role)}</div></div></div>`);
  });
} else { document.getElementById('charsCard').classList.add('hide'); }

// items
const models = document.getElementById('models');
if(DATA.items && DATA.items.length){
  DATA.items.forEach(m=>models.insertAdjacentHTML('beforeend',
    `<div class="model"><div class="mn">${esc(m.name)}</div><div class="md">${esc(m.desc)}</div></div>`));
} else { document.getElementById('itemsCard').classList.add('hide'); }

// themes
const paras = document.getElementById('paras');
if(DATA.themes && DATA.themes.length){
  DATA.themes.forEach(t=>paras.insertAdjacentHTML('beforeend',`<div class="para-item">${t}</div>`));
} else { document.getElementById('themesBox').classList.add('hide'); }

// footer
const order = (DATA.films||[]).map(f=>`${esc(f.title)} (${esc(f.year)})`).join(' · ');
document.getElementById('footer').innerHTML =
  (order?`<strong>Films in release order:</strong> ${order}.<br><br>`:'') +
  `Built with the Movie Timeline Mapper skill. Because the series branches, there is no single chronological line — each divergent future is its own branch above.`;

// filter
controls.addEventListener('click',e=>{
  const btn=e.target.closest('.btn'); if(!btn) return;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const f=btn.dataset.f;
  document.querySelectorAll('.branch').forEach(br=>br.classList.toggle('dim', f!=='all' && br.dataset.id!==f));
});
</script>
</body>
</html>
