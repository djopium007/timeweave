document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

border:1px solid rgba(255,42,31,0.28);background:#0c0e13;cursor:pointer;box-shadow:0 30px 80px -40px rgba(255,42,31,0.4);transition:transform .2s ease,border-color .2s ease;\" style-hover=\"transform:translateY(-3px);border-color:rgba(255,42,31,0.55);\">\n          <div style=\"position:relative;min-height:300px;padding:34px;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(135% 135% at 82% 96%, rgba(255,42,31,0.32), transparent 56%),linear-gradient(135deg,#170a09,#08090c);\">\n            <div style=\"position:absolute;inset:0;opacity:0.45;background:repeating-linear-gradient(115deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 9px);pointer-events:none;\"><\u002Fdiv>\n            {{ featured.art }}\n            <span style=\"position:relative;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#FF9C92;\">Spotlight Map<\u002Fspan>\n            <div style=\"position:relative;\">\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(40px,5vw,68px);line-height:0.92;letter-spacing:0.01em;text-transform:uppercase;\">{{ featured.title }}<\u002Fdiv>\n              <div style=\"margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#FFB7AF;\">{{ featured.meta }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:34px;display:flex;flex-direction:column;gap:18px;justify-content:center;\">\n            <p style=\"margin:0;color:#C4CDD8;font-size:17px;line-height:1.6;text-wrap:pretty;\">{{ featured.tagline }}<\u002Fp>\n            <p style=\"margin:0;color:#8b97a6;font-size:15px;line-height:1.6;text-wrap:pretty;\">{{ featured.blurb }}<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n              <sc-for list=\"{{ featured.branchChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n                <span style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:9px;margin-top:6px;font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;letter-spacing:0.05em;text-transform:uppercase;color:#FF7A6E;\">Open the map <span style=\"font-size:18px;\">→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- GRID -->\n      <section style=\"margin-top:clamp(40px,6vw,72px);\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;\">\n          <div>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#6b7686;\">The Library<\u002Fdiv>\n            <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(26px,3.5vw,38px);margin:6px 0 0;letter-spacing:0.01em;\">Franchises<\u002Fh2>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b7686;white-space:nowrap;\">{{ franchiseCount }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px;\">\n          <sc-for list=\"{{ franchises }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ f.onOpen }}\" style=\"{{ f.cardStyle }}\" style-hover=\"transform:translateY(-4px);border-color:rgba(255,255,255,0.22);\">\n              <div style=\"{{ f.posterStyle }}\">\n                <div style=\"position:absolute;inset:0;opacity:0.4;background:repeating-linear-gradient(115deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 10px);\"><\u002Fdiv>\n                {{ f.art }}\n                <span style=\"{{ f.badgeStyle }}\">{{ f.badgeLabel }}<\u002Fspan>\n                <div style=\"position:relative;font-family:'Oswald',sans-serif;font-weight:700;font-size:30px;line-height:0.95;text-transform:uppercase;letter-spacing:0.01em;text-wrap:balance;\">{{ f.title }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:16px 18px 18px;display:flex;flex-direction:column;gap:9px;\">\n                <p style=\"margin:0;color:#9aa6b4;font-size:13.5px;line-height:1.5;min-height:40px;text-wrap:pretty;\">{{ f.tagline }}<\u002Fp>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                  <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#7a8696;\">{{ f.meta }}<\u002Fspan>\n                  <span style=\"{{ f.ctaStyle }}\">{{ f.cta }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- HOW IT WORKS -->\n      <section style=\"margin-top:clamp(48px,7vw,84px);\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#6b7686;text-align:center;\">How it works<\u002Fdiv>\n        <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(26px,3.5vw,38px);margin:6px 0 36px;letter-spacing:0.01em;text-align:center;\">Three steps to clarity<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;\">\n          <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"position:relative;padding:26px 24px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg, rgba(20,23,29,0.7), rgba(11,13,17,0.7));\">\n              <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:48px;line-height:1;color:rgba(255,255,255,0.1);\">{{ s.num }}<\u002Fdiv>\n              <h3 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:21px;margin:8px 0 8px;letter-spacing:0.01em;\">{{ s.title }}<\u002Fh3>\n              <p style=\"margin:0;color:#9aa6b4;font-size:14.5px;line-height:1.55;text-wrap:pretty;\">{{ s.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CONTRIBUTE CTA -->\n      <section style=\"margin-top:clamp(40px,6vw,72px);position:relative;border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:linear-gradient(120deg, rgba(110,50,255,0.16), rgba(47,212,232,0.08) 60%, transparent),#0b0d12;padding:clamp(28px,5vw,52px);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:24px;\">\n        <div style=\"max-width:52ch;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#B69CFF;\">Built by fans<\u002Fdiv>\n          <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(26px,3.5vw,40px);margin:8px 0 10px;letter-spacing:0.01em;\">Know a timeline we're missing?<\u002Fh2>\n          <p style=\"margin:0;color:#A9B4C2;font-size:16px;line-height:1.6;text-wrap:pretty;\">Drop a single data file and the whole map renders itself — branches, rails, paradoxes and all. Submit a franchise or correct an existing thread.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ goContribute }}\" style=\"flex:none;padding:15px 28px;border-radius:12px;border:none;background:#fff;color:#0a0c10;font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:transform .16s ease;\" style-hover=\"transform:translateY(-2px);\">Contribute a map →<\u002Fbutton>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ TIMELINE ============ -->\n    <sc-if value=\"{{ isTimeline }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:clamp(24px,4vw,44px) clamp(20px,5vw,56px) 96px;\">\n\n      <button onclick=\"{{ goHub }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#9DB0C4;font-family:'DM Sans',sans-serif;font-size:13.5px;cursor:pointer;transition:all .16s ease;margin-bottom:22px;\" style-hover=\"border-color:rgba(255,255,255,0.25);color:#fff;\">← All franchises<\u002Fbutton>\n\n      <!-- TITLE BLOCK -->\n      <div style=\"display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;\">\n        <div style=\"{{ active.crestStyle }}\">\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;color:#fff;\">{{ active.initials }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:260px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#6b7686;\">{{ active.meta }}<\u002Fdiv>\n          <h1 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(34px,5vw,58px);line-height:1;margin:6px 0 0;text-transform:uppercase;letter-spacing:0.01em;\">{{ active.title }}<\u002Fh1>\n          <p style=\"margin:14px 0 0;max-width:72ch;color:#A9B4C2;font-size:16px;line-height:1.6;text-wrap:pretty;\">{{ active.framing }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CONTROLS -->\n      <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;margin:26px 0 8px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.07);\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;align-items:center;\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#6b7686;margin-right:4px;\">Branch<\u002Fspan>\n          <sc-for list=\"{{ filterButtons }}\" as=\"b\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(13,15,20,0.8);\">\n          <button onclick=\"{{ setRailView }}\" style=\"{{ railTabStyle }}\">⌇ Rail<\u002Fbutton>\n          <button onclick=\"{{ setTreeView }}\" style=\"{{ treeTabStyle }}\">⑃ Fork map<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LAYOUT: timeline + aside -->\n      <div style=\"display:flex;flex-wrap:wrap;gap:26px;margin-top:26px;align-items:flex-start;\">\n\n        <!-- TIMELINE COLUMN -->\n        <div style=\"flex:3 1 560px;min-width:300px;\">\n\n          <sc-if value=\"{{ isTree }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;margin-bottom:6px;\">\n              <div style=\"display:inline-flex;align-items:center;gap:9px;padding:9px 18px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);background:rgba(13,15,20,0.9);\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff;\"><\u002Fspan>\n                <span style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;letter-spacing:0.05em;text-transform:uppercase;\">{{ active.forkLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"width:1px;height:22px;background:linear-gradient(#ffffff,transparent);\"><\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7686;\">timeline diverges into {{ active.branchCount }} futures<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"{{ branchesContainerStyle }}\">\n            <sc-for list=\"{{ branches }}\" as=\"br\" hint-placeholder-count=\"4\">\n              <div style=\"{{ br.wrapperStyle }}\">\n                <sc-if value=\"{{ br.showConnector }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"{{ br.connectorStyle }}\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <!-- branch header -->\n                <div onclick=\"{{ br.onToggle }}\" style=\"{{ br.headerStyle }}\">\n                  <div style=\"display:flex;align-items:center;gap:12px;min-width:0;\">\n                    <span style=\"{{ br.dotStyle }}\"><\u002Fspan>\n                    <div style=\"min-width:0;\">\n                      <div style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(18px,2.4vw,23px);letter-spacing:0.01em;text-transform:uppercase;line-height:1.05;\">{{ br.title }}<\u002Fdiv>\n                      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#7a8696;margin-top:3px;\">{{ br.filmsLabel }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ br.showChevron }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"{{ br.chevronStyle }}\">⌄<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <!-- collapsible body -->\n                <div style=\"{{ br.gridStyle }}\">\n                  <div style=\"overflow:hidden;min-height:0;\">\n                    <div style=\"{{ br.bodyPadStyle }}\">\n                      <p style=\"margin:0 0 18px;color:#9aa6b4;font-size:14.5px;line-height:1.55;font-style:italic;text-wrap:pretty;\">{{ br.summary }}<\u002Fp>\n                      <div style=\"position:relative;\">\n                        <div style=\"{{ br.railLineStyle }}\"><\u002Fdiv>\n                        <div style=\"display:flex;flex-direction:column;gap:{{ br.nodeGap }};\">\n                          <sc-for list=\"{{ br.nodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n                            <div style=\"position:relative;display:flex;gap:16px;align-items:flex-start;\">\n                              <div style=\"flex:none;width:34px;display:flex;justify-content:center;padding-top:5px;\">\n                                <span style=\"{{ n.markerStyle }}\"><\u002Fspan>\n                              <\u002Fdiv>\n                              <div style=\"flex:1;min-width:0;padding-bottom:2px;\">\n                                <span style=\"{{ n.eraStyle }}\">{{ n.era }}<\u002Fspan>\n                                <p style=\"margin:8px 0 0;color:#D4DBE4;font-size:15px;line-height:1.55;text-wrap:pretty;\">{{ n.text }}<\u002Fp>\n                                <sc-if value=\"{{ n.hasTags }}\" hint-placeholder-val=\"{{ true }}\">\n                                  <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;\">\n                                    <sc-for list=\"{{ n.tags }}\" as=\"t\" hint-placeholder-count=\"2\">\n                                      <span style=\"{{ t.style }}\">{{ t.label }}<\u002Fspan>\n                                    <\u002Fsc-for>\n                                  <\u002Fdiv>\n                                <\u002Fsc-if>\n                              <\u002Fdiv>\n                            <\u002Fdiv>\n                          <\u002Fsc-for>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ASIDE -->\n        <aside style=\"flex:1 1 290px;min-width:260px;display:flex;flex-direction:column;gap:18px;position:sticky;top:88px;\">\n          <div style=\"border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(18,21,27,0.85),rgba(11,13,17,0.85));padding:20px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#6b7686;margin-bottom:14px;\">Key Characters<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:11px;\">\n              <sc-for list=\"{{ characters }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:12px;\">\n                  <div style=\"{{ c.avatarStyle }}\">{{ c.initials }}<\u002Fdiv>\n                  <div style=\"min-width:0;\">\n                    <div style=\"font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;letter-spacing:0.01em;line-height:1.1;\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"color:#8b97a6;font-size:12.5px;line-height:1.35;text-wrap:pretty;\">{{ c.role }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg,rgba(18,21,27,0.85),rgba(11,13,17,0.85));padding:20px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#6b7686;margin-bottom:14px;\">Items &amp; Tech<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px;\">\n              <sc-for list=\"{{ items }}\" as=\"it\" hint-placeholder-count=\"5\">\n                <div>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;color:#54DBFF;letter-spacing:0.02em;\">{{ it.name }}<\u002Fdiv>\n                  <div style=\"color:#9aa6b4;font-size:13px;line-height:1.45;margin-top:2px;text-wrap:pretty;\">{{ it.desc }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"border-radius:16px;border:1px solid rgba(110,50,255,0.3);background:linear-gradient(180deg,rgba(110,50,255,0.12),rgba(11,13,17,0.6));padding:20px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px;\">\n              <span style=\"width:13px;height:13px;border-radius:3px;background:#B69CFF;transform:rotate(45deg);box-shadow:0 0 12px rgba(182,156,255,0.8);\"><\u002Fspan>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#C9B8FF;\">Themes &amp; Paradoxes<\u002Fdiv>\n            <\u002Fdiv>\n            <ul style=\"margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;\">\n              <sc-for list=\"{{ themes }}\" as=\"th\" hint-placeholder-count=\"3\">\n                <li style=\"position:relative;padding-left:16px;color:#C4C0D8;font-size:13.5px;line-height:1.5;text-wrap:pretty;\">\n                  <span style=\"position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:#B69CFF;\"><\u002Fspan>\n                  {{ th }}\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Faside>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ CONTRIBUTE ============ -->\n    <sc-if value=\"{{ isContribute }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:680px;margin:0 auto;padding:clamp(28px,5vw,60px) clamp(20px,5vw,40px) 96px;\">\n      <button onclick=\"{{ goHub }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:#9DB0C4;font-family:'DM Sans',sans-serif;font-size:13.5px;cursor:pointer;transition:all .16s ease;margin-bottom:26px;\" style-hover=\"border-color:rgba(255,255,255,0.25);color:#fff;\">← Back to hub<\u002Fbutton>\n\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#B69CFF;\">Add to the wiki<\u002Fdiv>\n        <h1 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(32px,5vw,48px);line-height:1.02;margin:8px 0 12px;letter-spacing:0.01em;\">Contribute a map<\u002Fh1>\n        <p style=\"margin:0 0 30px;color:#A9B4C2;font-size:16px;line-height:1.6;text-wrap:pretty;\">Submit a new franchise or suggest an edit to an existing one. Maps are generated from a single structured file — give us the shape and our editors weave the rest.<\u002Fp>\n\n        <div style=\"border-radius:18px;border:1px solid rgba(255,255,255,0.1);background:linear-gradient(180deg,rgba(18,21,27,0.8),rgba(11,13,17,0.8));padding:clamp(22px,4vw,32px);display:flex;flex-direction:column;gap:22px;\">\n          <div>\n            <label style=\"display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8b97a6;margin-bottom:10px;\">Submission type<\u002Flabel>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n              <button onclick=\"{{ setTypeNew }}\" style=\"{{ typeNewStyle }}\">+ New franchise<\u002Fbutton>\n              <button onclick=\"{{ setTypeEdit }}\" style=\"{{ typeEditStyle }}\">✎ Suggest an edit<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8b97a6;margin-bottom:8px;\">{{ nameFieldLabel }}<\u002Flabel>\n            <input value=\"{{ form.name }}\" onchange=\"{{ onFormName }}\" placeholder=\"e.g. Planet of the Apes\" style=\"width:100%;background:rgba(6,7,10,0.7);border:1px solid rgba(255,255,255,0.13);border-radius:11px;color:#E9EDF3;font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 15px;transition:border-color .16s ease;\" style-focus=\"border-color:rgba(255,42,31,0.55);\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8b97a6;margin-bottom:8px;\">Your handle <span style=\"color:#5a6573;text-transform:none;letter-spacing:0;\">(for credit)<\u002Fspan><\u002Flabel>\n            <input value=\"{{ form.handle }}\" onchange=\"{{ onFormHandle }}\" placeholder=\"@username\" style=\"width:100%;background:rgba(6,7,10,0.7);border:1px solid rgba(255,255,255,0.13);border-radius:11px;color:#E9EDF3;font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 15px;transition:border-color .16s ease;\" style-focus=\"border-color:rgba(255,42,31,0.55);\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#8b97a6;margin-bottom:8px;\">{{ noteFieldLabel }}<\u002Flabel>\n            <textarea value=\"{{ form.note }}\" onchange=\"{{ onFormNote }}\" rows=\"4\" placeholder=\"Outline the branches, key forks, and any paradoxes…\" style=\"width:100%;resize:vertical;background:rgba(6,7,10,0.7);border:1px solid rgba(255,255,255,0.13);border-radius:11px;color:#E9EDF3;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;padding:13px 15px;transition:border-color .16s ease;\" style-focus=\"border-color:rgba(255,42,31,0.55);\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <button onclick=\"{{ submitContribute }}\" style=\"align-self:flex-start;padding:14px 28px;border-radius:11px;border:none;background:#FF2A1F;color:#fff;font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:all .16s ease;\" style-hover=\"background:#ff3a30;box-shadow:0 0 24px -2px rgba(255,42,31,0.7);\">Submit to review queue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border-radius:18px;border:1px solid rgba(61,220,132,0.35);background:linear-gradient(180deg,rgba(61,220,132,0.1),rgba(11,13,17,0.6));padding:clamp(28px,5vw,44px);text-align:center;\">\n        <div style=\"width:62px;height:62px;margin:0 auto;border-radius:50%;display:grid;place-items:center;background:rgba(61,220,132,0.16);border:1px solid rgba(61,220,132,0.5);box-shadow:0 0 30px -6px rgba(61,220,132,0.6);\">\n          <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7.5\" stroke=\"#3DDC84\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:30px;margin:20px 0 8px;letter-spacing:0.01em;\">In the review queue<\u002Fh2>\n        <p style=\"margin:0 auto 22px;max-width:44ch;color:#A9B4C2;font-size:15.5px;line-height:1.6;text-wrap:pretty;\">{{ submitMessage }}<\u002Fp>\n        <div style=\"display:inline-flex;align-items:center;gap:18px;padding:14px 22px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(6,7,10,0.6);margin-bottom:26px;\">\n          <div style=\"text-align:left;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6b7686;\">Queue position<\u002Fdiv>\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;color:#fff;\">#{{ queuePosition }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"width:1px;align-self:stretch;background:rgba(255,255,255,0.1);\"><\u002Fdiv>\n          <div style=\"text-align:left;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6b7686;\">Est. review<\u002Fdiv>\n            <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:26px;color:#fff;\">~3 days<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;\">\n          <button onclick=\"{{ resetContribute }}\" style=\"padding:12px 22px;border-radius:10px;border:1px solid rgba(255,255,255,0.16);background:rgba(255,255,255,0.04);color:#E9EDF3;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .16s ease;\" style-hover=\"border-color:rgba(255,255,255,0.3);\">Submit another<\u002Fbutton>\n          <button onclick=\"{{ goHub }}\" style=\"padding:12px 22px;border-radius:10px;border:none;background:#fff;color:#0a0c10;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;\">Back to hub<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"position:relative;z-index:10;margin-top:40px;border-top:1px solid rgba(255,255,255,0.08);background:linear-gradient(180deg, rgba(8,9,12,0) 0%, rgba(6,7,10,0.9) 60%);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(40px,5vw,60px) clamp(20px,5vw,56px) 30px;display:flex;flex-wrap:wrap;gap:36px 56px;align-items:center;justify-content:space-between;\">\n      <div style=\"flex:1 1 280px;max-width:400px;display:flex;flex-direction:column;gap:14px;\">\n        <div style=\"display:flex;align-items:center;gap:11px;\">\n          <div style=\"position:relative;width:28px;height:28px;display:grid;place-items:center;\">\n            <div style=\"position:absolute;width:28px;height:28px;border-radius:8px;border:1.5px solid rgba(255,42,31,0.55);transform:rotate(45deg);box-shadow:0 0 12px rgba(255,42,31,0.3);\"><\u002Fdiv>\n            <div style=\"width:8px;height:8px;border-radius:50%;background:#FF2A1F;box-shadow:0 0 9px rgba(255,42,31,0.9);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:600;font-size:19px;letter-spacing:0.04em;text-transform:uppercase;\">Time<span style=\"color:#FF5747;\">Weave<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;color:#8b97a6;font-size:14px;line-height:1.6;text-wrap:pretty;\">A community-built atlas of branching movie timelines. Every map is generated from a single open data file — fork it, fix it, or add your own.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:36px 52px;\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#6b7686;\">Explore<\u002Fdiv>\n        <button onclick=\"{{ goHub }}\" style=\"text-align:left;padding:0;border:none;background:none;color:#A9B4C2;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Hub<\u002Fbutton>\n        <button onclick=\"{{ goExplore }}\" style=\"text-align:left;padding:0;border:none;background:none;color:#A9B4C2;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Terminator map<\u002Fbutton>\n        <button onclick=\"{{ goContribute }}\" style=\"text-align:left;padding:0;border:none;background:none;color:#A9B4C2;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Contribute<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#6b7686;\">The project<\u002Fdiv>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">How it works<\u002Fspan>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Open data model<\u002Fspan>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Roadmap<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#6b7686;\">Community<\u002Fdiv>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Review queue<\u002Fspan>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Contributors<\u002Fspan>\n        <span style=\"color:#A9B4C2;font-size:14px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">Style guide<\u002Fspan>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1240px;margin:0 auto;padding:18px clamp(20px,5vw,56px) 36px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-wrap:wrap;gap:12px 22px;align-items:center;justify-content:space-between;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#5e6878;\">© 2026 TimeWeave · A fan project<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#4f5867;max-width:62ch;text-wrap:pretty;\">Film titles &amp; characters are property of their respective rights holders. Not affiliated with or endorsed by any studio.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- TOAST -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:80;display:flex;align-items:center;gap:14px;max-width:90vw;padding:14px 16px 14px 18px;border-radius:13px;border:1px solid rgba(255,255,255,0.14);background:rgba(16,18,24,0.96);backdrop-filter:blur(12px);box-shadow:0 24px 60px -20px rgba(0,0,0,0.9);\">\n      <span style=\"{{ toast.dotStyle }}\"><\u002Fspan>\n      <div style=\"min-width:0;\">\n        <div style=\"font-size:14.5px;font-weight:600;color:#fff;\">{{ toast.title }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9aa6b4;\">{{ toast.body }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ toast.hasAction }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ toast.onAction }}\" style=\"flex:none;margin-left:6px;padding:8px 14px;border-radius:8px;border:none;background:#FF2A1F;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;\">{{ toast.actionLabel }}<\u002Fbutton>\n      <\u002Fsc-if>\n      <button onclick=\"{{ dismissToast }}\" style=\"flex:none;width:28px;height:28px;border-radius:7px;border:none;background:transparent;color:#7a8696;font-size:18px;cursor:pointer;transition:color .15s ease;\" style-hover=\"color:#fff;\">×<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#FF2A1F&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;ambientMotion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;density&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;cozy&quot;, &quot;compact&quot;], &quot;default&quot;: &quot;cozy&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'hub',\n    activeId: 'terminator',\n    search: '',\n    filter: 'all',\n    collapsed: {},\n    view: 'rail',\n    toast: null,\n    form: { type: 'new', name: '', handle: '', note: '' },\n    submitted: false,\n    queuePos: 47,\n  };\n\n  // ---------- data (generic: one object per franchise) ----------\n  data = {\n    terminator: {\n      id: 'terminator',\n      title: 'Terminator',\n      accent: '#FF2A1F',\n      tagline: 'Six films, four divergent futures — and a war that keeps rewriting its own past.',\n      blurb: 'Every sequel cracks the timeline a different way. Follow each fork from the 2029 war back to the moment it splits.',\n      meta: '6 films · 4 branches',\n      framing: 'Each Terminator film resets the rules of time travel. Rather than one continuity, the saga is four parallel attempts to stop the same war — each branch its own self-contained loop. Pick a branch to isolate it.',\n      forkLabel: '2029 · The Machine War',\n      films: ['The Terminator (1984)','T2: Judgment Day (1991)','T3: Rise of the Machines (2003)','Salvation (2009)','Genisys (2015)','Dark Fate (2019)'],\n      branches: [\n        { id:'b1', title:'Original Causal Loop', color:'#FF2A1F', films:['The Terminator','T2: Judgment Day'],\n          summary:'Travelling to the past only preserves the future. Every intervention turns out to have always happened.',\n          nodes:[\n            { era:'2029', type:'turning-point', text:\"John Connor's resistance breaks Skynet. In defeat, Skynet sends a T-800 to 1984 to kill Sarah Connor; John sends Kyle Reese to stop it.\", tags:[{label:'Turning Point',kind:'turning-point'}] },\n            { era:'1984', type:'paradox', text:'Kyle Reese protects Sarah, fathers John, then dies. The future sends back the man who creates its own savior.', tags:[{label:'Paradox',kind:'paradox'},{label:'Kyle Reese',kind:'character'}] },\n            { era:'1984', type:'event', text:'The T-800 is crushed in a hydraulic press at the Cyberdyne factory. Its CPU chip and right arm survive in the wreckage.', tags:[{label:'Model 101',kind:'tech'}] },\n            { era:'1995', type:'paradox', text:'Cyberdyne reverse-engineers the salvaged chip and arm to build Skynet — the very intelligence that sent the Terminator back. It builds itself.', tags:[{label:'Paradox',kind:'paradox'},{label:'Cyberdyne',kind:'tech'}] },\n            { era:'1995', type:'turning-point', text:'Sarah, John and a reprogrammed T-800 destroy Cyberdyne and the recovered parts. \"No fate but what we make.\"', tags:[{label:'Turning Point',kind:'turning-point'}] },\n            { era:'1997 · Aug 29', type:'resolution', text:'Judgment Day passes without the nuclear war. The original timeline is broken — or merely delayed.', tags:[{label:'Resolution',kind:'resolution'}] },\n          ] },\n        { id:'b2', title:'Judgment Day Delayed', color:'#F5A623', films:['T3: Rise of the Machines','Salvation'],\n          summary:'You cannot stop Judgment Day, only postpone it. Skynet is no longer a building — it is the network itself.',\n          nodes:[\n            { era:'2003', type:'event', text:'Skynet has spread as distributed software across the U.S. military network. There is no central server left to blow up.', tags:[{label:'Skynet',kind:'tech'}] },\n            { era:'2004 · Jul 25', type:'turning-point', text:'Judgment Day arrives — just years late. Skynet goes live and launches the missiles. John and Kate Brewster ride it out in the Crystal Peak bunker.', tags:[{label:'Turning Point',kind:'turning-point'}] },\n            { era:'2018', type:'event', text:'An adult John Connor leads the human resistance through the irradiated ruins against Skynet\\u2019s hunter-killers.', tags:[{label:'John Connor',kind:'character'}] },\n            { era:'2018', type:'death', text:'Marcus Wright \\u2014 a death-row prisoner remade as a cyborg \\u2014 gives his heart to save a mortally wounded John Connor.', tags:[{label:'Sacrifice',kind:'death'},{label:'Marcus Wright',kind:'character'}] },\n            { era:'2018', type:'resolution', text:'John survives on a borrowed heart. The war grinds on, but its leader lives to fight it.', tags:[{label:'Resolution',kind:'resolution'}] },\n          ] },\n        { id:'b3', title:'Genisys Reboot', color:'#2FD4E8', films:['Terminator Genisys'],\n          summary:'A nexus point in 2029 shatters the original past. Kyle arrives to a war that no longer matches his memories.',\n          nodes:[\n            { era:'2029', type:'turning-point', text:'At the instant Kyle Reese is sent back, the timeline fractures. A nexus point overwrites everything that came before.', tags:[{label:'Turning Point',kind:'turning-point'},{label:'Paradox',kind:'paradox'}] },\n            { era:'1973', type:'event', text:'A reprogrammed T-800 \\u2014 \"Pops\" \\u2014 is sent back to protect Sarah Connor from age nine, raising her as a guardian and a soldier.', tags:[{label:'Model 101',kind:'tech'},{label:'Sarah Connor',kind:'character'}] },\n            { era:'1984', type:'paradox', text:'Kyle lands expecting a frightened waitress and finds a hardened warrior who already knows him. The past he was briefed on is gone.', tags:[{label:'Paradox',kind:'paradox'}] },\n            { era:'2017 · Oct', type:'turning-point', text:'Genisys \\u2014 a friendly-looking OS hiding Skynet, syncing every device on Earth \\u2014 counts down to going online.', tags:[{label:'Genisys',kind:'tech'},{label:'Turning Point',kind:'turning-point'}] },\n            { era:'2017', type:'resolution', text:'Sarah, Kyle and Pops destroy the Cyberdyne facility before activation. The reboot timeline seals itself off.', tags:[{label:'Resolution',kind:'resolution'}] },\n          ] },\n        { id:'b4', title:'Dark Fate / Legion', color:'#34D27B', films:['Terminator: Dark Fate'],\n          summary:'Kill the savior and the threat just changes its name. Skynet is erased; Legion rises to take its place.',\n          nodes:[\n            { era:'1998', type:'death', text:'A leftover T-800 finishes its mission years late and kills a young John Connor on a beach in Guatemala. The chosen one is gone.', tags:[{label:'Death',kind:'death'},{label:'John Connor',kind:'character'}] },\n            { era:'1998+', type:'paradox', text:'With John dead, Skynet\\u2019s war never happens \\u2014 yet a new AI, Legion, rises anyway. The threat was structural, not personal.', tags:[{label:'Paradox',kind:'paradox'},{label:'Legion',kind:'tech'}] },\n            { era:'2020', type:'event', text:'Legion sends a Rev-9 to Mexico City to kill Dani Ramos. Grace, an augmented human soldier from 2042, is sent to protect her.', tags:[{label:'Dani Ramos',kind:'character'},{label:'Rev-9',kind:'tech'}] },\n            { era:'2020', type:'turning-point', text:'Sarah Connor and an aged T-800 named \"Carl\" join the fight. The mother of the old future guards the leader of the new one.', tags:[{label:'Turning Point',kind:'turning-point'}] },\n            { era:'2042', type:'resolution', text:'Dani is revealed as the future leader herself \\u2014 not the mother of one. The cycle of waiting for a chosen son is finally broken.', tags:[{label:'Resolution',kind:'resolution'}] },\n          ] },\n      ],\n      characters: [\n        { name:'Sarah Connor', role:'The waitress who becomes the war\\u2019s prophet.' },\n        { name:'John Connor', role:'Foretold leader of the human resistance.' },\n        { name:'Kyle Reese', role:'Soldier sent back; John\\u2019s father.' },\n        { name:'T-800 / Carl', role:'Villain, guardian, and finally a man.' },\n        { name:'Dani Ramos', role:'The new future\\u2019s leader, not its mother.' },\n        { name:'Grace', role:'Augmented human protector from 2042.' },\n        { name:'Skynet / Legion', role:'The AI that keeps reinventing itself.' },\n      ],\n      items: [\n        { name:'T-800 / Model 101', desc:'Living tissue over a steel endoskeleton. The icon.' },\n        { name:'T-1000', desc:'Mimetic liquid metal; takes any shape it touches. (T2)' },\n        { name:'T-X', desc:'Anti-Terminator hunter with onboard plasma weapons. (T3)' },\n        { name:'T-3000', desc:'A human converted into machine-phase matter. (Genisys)' },\n        { name:'Rev-9', desc:'Splits into liquid skin + endoskeleton to fight as two. (Dark Fate)' },\n        { name:'Grace (augment)', desc:'Not a machine \\u2014 a fast, strong, mortal human. (Dark Fate)' },\n      ],\n      themes: [\n        'Bootstrap paradox: the future sends Kyle Reese back, where he fathers the very leader who sends him.',\n        'Skynet builds itself \\u2014 every attempt to destroy it leaves behind the parts used to create it.',\n        '\"No fate but what we make\" \\u2014 the saga can never decide if the future is fixed or rewritable.',\n        'Erase the savior, inherit the threat: kill John or stop Skynet, and a new AI simply rises in its place.',\n      ],\n    },    xmen: {\n      id: 'xmen',\n      title: 'X-Men',\n      accent: '#2F80ED',\n      tagline: 'Thirteen films, one stray choice in 1973, and a saga that rewrites its own future.',\n      blurb: 'One continuity from ancient Egypt to 2029 — until Wolverine’s 1973 errand splits it into a doomed future and a corrected one.',\n      meta: '13 films · 3 branches',\n      framing: 'The Fox X-Men films play as a single continuity that runs from ancient Egypt to 2029 — until Days of Future Past splits it in two. Everything before 1973 is shared history. Then Wolverine’s mind is sent back to that year, and whether Mystique kills or spares Bolivar Trask decides which of two futures the rest of the franchise lives in.',\n      forkLabel: '1973 · The Trask Decision',\n      films: ['X-Men (2000)','X2: X-Men United (2003)','X-Men: The Last Stand (2006)','X-Men Origins: Wolverine (2009)','X-Men: First Class (2011)','The Wolverine (2013)','X-Men: Days of Future Past (2014)','Deadpool (2016)','X-Men: Apocalypse (2016)','Logan (2017)','Deadpool 2 (2018)','Dark Phoenix (2019)','The New Mutants (2020)'],\n      branches: [\n        { id:'b1', title:'Shared Origins (3600 BC – 1973)', color:'#2F80ED', films:['X-Men: First Class','X-Men Origins: Wolverine'],\n          summary:'The common past both timelines are built on, up to the moment it forks.',\n          nodes:[\n            { era:'3600 BC', type:'event', text:'In Egypt, En Sabah Nur (Apocalypse) — perhaps the first mutant — is betrayed mid-ritual and entombed in his pyramid, to sleep for millennia.', tags:[{label:'Apocalypse',kind:'character'}] },\n            { era:'1845', type:'event', text:'In Canada, young James Howlett sprouts bone claws in a rage; he flees with half-brother Victor Creed, the two sharing a healing factor that grants near-eternal life.', tags:[{label:'Wolverine',kind:'character'}] },\n            { era:'1845–1945', type:'event', text:'Now calling himself Logan, James and Victor fight as soldiers through the Civil War, WWI and WWII without aging.', tags:[] },\n            { era:'c.1944', type:'turning-point', text:'At Auschwitz, young Erik Lehnsherr’s magnetism erupts as he’s torn from his mother; Dr. Schmidt (Sebastian Shaw) murders her to force the power out.', tags:[{label:'Magneto',kind:'character'}] },\n            { era:'c.1944', type:'event', text:'A young Charles Xavier finds shapeshifter Raven (Mystique) raiding his kitchen and takes her in as a sister.', tags:[] },\n            { era:'1945', type:'event', text:'A POW outside Nagasaki, Logan shields officer Yashida from the atomic blast — a debt that resurfaces decades later in Japan.', tags:[] },\n            { era:'1962', type:'turning-point', text:'First Class: Charles, Erik and the CIA stop Shaw from igniting WWIII during the Cuban Missile Crisis. Erik kills Shaw; a deflected bullet paralyses Charles.', tags:[{label:'Cuban Missile Crisis',kind:'event'}] },\n            { era:'1962', type:'event', text:'The friends split: Charles founds the X-Men, while Erik becomes Magneto and leaves with Mystique. ”You’re X-Men.”', tags:[] },\n            { era:'1963', type:'event', text:'Magneto curves the bullet trying to protect JFK — a mutant — but is blamed for the assassination and buried beneath the Pentagon.', tags:[] },\n            { era:'1965', type:'event', text:'Xavier opens his School for Gifted Youngsters: a public boarding school, secretly a haven where mutants learn to control their powers.', tags:[] },\n            { era:'1973', type:'turning-point', text:'Weapons designer Bolivar Trask experiments on mutants to build adaptive Sentinels. Mystique tracks him to the Paris Peace Accords — the hinge the whole saga turns on.', tags:[{label:'Sentinels',kind:'tech'}] },\n          ] },\n        { id:'b2', title:'Original Timeline → Dark Future', color:'#FF5B5B', films:['X-Men Origins: Wolverine','X-Men','X2: X-Men United','X-Men: The Last Stand','The Wolverine','X-Men: Days of Future Past'],\n          summary:'The doomed line where Mystique kills Trask — it ends in a Sentinel apocalypse, then is erased.',\n          nodes:[\n            { era:'1973', type:'turning-point', text:'Mystique assassinates Trask. It backfires: the killing proves mutants are dangerous and gets the Sentinel program greenlit.', tags:[{label:'Divergence',kind:'event'}] },\n            { era:'1973', type:'death', text:'Captured, Mystique is tortured and experimented on; her shapeshifting DNA becomes the key to Sentinels that adapt to any mutant.', tags:[] },\n            { era:'1979', type:'event', text:'Origins: Logan and Victor (now Sabretooth) serve in Stryker’s Team X until Logan, sickened by the killing, walks away.', tags:[{label:'Weapon X',kind:'character'}] },\n            { era:'1979', type:'turning-point', text:'Lured by revenge, Logan lets Stryker bond adamantium to his skeleton — Weapon X — then is shot with adamantium bullets that erase his memory.', tags:[{label:'Adamantium',kind:'tech'}] },\n            { era:'1979', type:'event', text:'At Three Mile Island, Logan frees captive mutants (including a young Scott Summers); the patchwork Weapon XI (Deadpool) is destroyed.', tags:[] },\n            { era:'c.1980s', type:'event', text:'Xavier walls off Jean Grey’s mind with psychic barriers, splitting her into Jean and a dormant, instinctual Phoenix.', tags:[{label:'Phoenix',kind:'character'}] },\n            { era:'2000', type:'turning-point', text:'X-Men: Magneto’s mutation machine threatens to kill all of NYC; Wolverine, Rogue and the X-Men stop him atop the Statue of Liberty.', tags:[{label:'Mutant Registration',kind:'event'}] },\n            { era:'2003', type:'death', text:'X2: Stryker raids the school and builds an evil Cerebro to kill every mutant; Jean Grey dies holding back the Alkali Lake flood.', tags:[{label:'Cerebro',kind:'tech'}] },\n            { era:'2006', type:'death', text:'The Last Stand: a mutant ”cure” sparks open war. The resurrected Phoenix kills Cyclops and Xavier before Wolverine is forced to kill Jean.', tags:[{label:'The Cure',kind:'tech'}] },\n            { era:'2013', type:'event', text:'The Wolverine: a grieving Logan, in Japan, loses and regains his healing factor, defeats an immortality-hungry Yashida, and finally lets Jean go.', tags:[] },\n            { era:'2023', type:'death', text:'DOFP future: adaptive Sentinels have exterminated mutants and anyone who helped them — a global graveyard.', tags:[{label:'Sentinels',kind:'tech'}] },\n            { era:'2023', type:'resolution', text:'The last survivors use Kitty Pryde to send Wolverine’s consciousness back to 1973 — a gamble that, if it works, erases this entire timeline.', tags:[{label:'Time Travel',kind:'paradox'}] },\n          ] },\n        { id:'b3', title:'Revised Timeline (post-1973)', color:'#39D98A', films:['X-Men: Days of Future Past','X-Men: Apocalypse','Dark Phoenix','Deadpool','Deadpool 2','The New Mutants','Logan'],\n          summary:'The corrected line, born when Mystique spares Trask — the future the later films live in.',\n          nodes:[\n            { era:'1973', type:'turning-point', text:'DOFP: Wolverine’s mind from 2023 reunites young Charles and Erik. At the White House, Mystique spares Trask — rewriting history live on television.', tags:[{label:'Divergence',kind:'event'}] },\n            { era:'1973', type:'paradox', text:'Sparing Trask erases the Sentinel future before it can happen; only Wolverine remembers the dark timeline that now never occurred.', tags:[{label:'Paradox',kind:'paradox'}] },\n            { era:'2023 (new)', type:'resolution', text:'Wolverine wakes in a bright future — Jean, Scott and the X-Men alive again. The original trilogy’s tragedies are undone.', tags:[{label:'Jean Grey',kind:'character'}] },\n            { era:'1983', type:'turning-point', text:'Apocalypse: the awakened En Sabah Nur and his Four Horsemen are beaten when a young Jean unleashes the Phoenix; mutants step into the public eye.', tags:[{label:'Apocalypse',kind:'character'}] },\n            { era:'1983', type:'event', text:'At Stryker’s facility, a quiet visitor from Essex Corp collects a vial of Weapon X’s blood — the seed of future mutant cloning.', tags:[{label:'Essex Corp',kind:'character'}] },\n            { era:'1992', type:'death', text:'Dark Phoenix: a cosmic force supercharges Jean; she accidentally kills Mystique, then sacrifices herself destroying the alien D’Bari in space.', tags:[{label:'Phoenix',kind:'character'}] },\n            { era:'c.2016', type:'event', text:'Deadpool: dying mercenary Wade Wilson is tortured into a scarred healing factor by Ajax, kills his way to revenge, and wins back Vanessa.', tags:[{label:'Deadpool',kind:'character'}] },\n            { era:'c.2018', type:'event', text:'Deadpool 2: after Vanessa’s death, Wade, time-traveller Cable and X-Force save young Firefist; Cable spends his last charge resetting Wade’s fate.', tags:[{label:'Time Travel',kind:'paradox'}] },\n            { era:'c.2020s', type:'event', text:'The New Mutants: five teens escape an Essex Corp facility breeding child soldiers; Dani Moonstar masters her power and tames the Demon Bear.', tags:[{label:'Essex Corp',kind:'character'}] },\n            { era:'2028', type:'death', text:'Alkali-Transigen’s gene-suppressant has halted mutant births for decades; a senile Xavier’s seizure kills several X-Men and disbands the team.', tags:[{label:'Transigen',kind:'character'}] },\n            { era:'2029', type:'turning-point', text:'Logan: a poisoned, aging Logan protects his cloned daughter Laura (X-23) from Transigen’s soulless copy, X-24.', tags:[{label:'X-23',kind:'character'}] },\n            { era:'2029', type:'resolution', text:'Logan dies so the mutant children reach the Canadian border. ”Don’t be what they made you.” Laura turns his grave’s cross sideways into an X.', tags:[{label:'Wolverine',kind:'character'}] },\n          ] },\n      ],\n      characters: [\n        { name:'Logan / Wolverine', role:'The clawed, near-immortal thread of the saga — and the only one who remembers the timeline that was erased.' },\n        { name:'Charles Xavier', role:'Professor X; dreams of coexistence and twice buries Jean Grey’s pain behind psychic walls — in both timelines.' },\n        { name:'Erik / Magneto', role:'Holocaust survivor turned mutant militant; Charles’s eternal friend and opposite across every era.' },\n        { name:'Raven / Mystique', role:'Shapeshifter whose 1973 choice — kill or spare Trask — forks the entire franchise.' },\n        { name:'Jean Grey / Phoenix', role:'Telepath whose caged power becomes the Phoenix; dies and is reborn in both timelines.' },\n        { name:'Wade Wilson / Deadpool', role:'Motor-mouthed mercenary of the revised timeline, healing factor and fourth wall both intact.' },\n        { name:'Laura / X-23', role:'Wolverine’s cloned daughter; his legacy and the future he dies to protect in Logan.' },\n        { name:'Victor Creed / Sabretooth', role:'Logan’s feral half-brother and lifelong rival across a century of wars.' },\n        { name:'En Sabah Nur / Apocalypse', role:'The first mutant, entombed in 3600 BC and woken in 1983 to cleanse the world.' },\n        { name:'William Stryker', role:'Anti-mutant zealot behind Weapon X, the X2 raid, and the adamantium that defines Wolverine.' },\n      ],\n      items: [\n        { name:'Adamantium', desc:'Indestructible metal bonded to Wolverine’s skeleton — his greatest weapon and, slowly, his poison.' },\n        { name:'Sentinels', desc:'Anti-mutant robots; the adaptive models built from Mystique’s DNA bring on the dark future.' },\n        { name:'Cerebro', desc:'Xavier’s telepathy amplifier — used to find mutants, and weaponized by Stryker to kill them.' },\n        { name:'Magneto’s Helmet', desc:'Shields the wearer’s mind from telepaths like Xavier; passed down from Shaw.' },\n        { name:'The Mutant Cure', desc:'Gene-suppressing serum from The Last Stand; offered as a choice, used as a weapon.' },\n        { name:'The Phoenix Force', desc:'A cosmic power drawn to Jean Grey — creator and destroyer of worlds.' },\n        { name:'Transigen Suppressant', desc:'Gene therapy slipped into the food supply to stop new mutants from being born.' },\n        { name:'X-24', desc:'Soulless, feral clone of Wolverine grown by Transigen to obey without question.' },\n      ],\n      themes: [\n        'The 1973 fork: a single choice — Mystique killing or sparing Trask — splits the saga into a doomed timeline and a corrected one.',\n        'Wolverine is the thread: Logan runs through every era and is the only one who carries memory of the future that was undone.',\n        'The cycle repeats: in both timelines Xavier cages Jean’s mind to protect her, and in both the Phoenix breaks loose anyway.',\n        'Adamantium giveth and taketh: the metal that makes Wolverine unkillable is the same metal that finally kills him.',\n        'Fear builds the monster: Sentinels, the Cure, and Transigen are all anti-mutant weapons engineered from mutant DNA and turned back on them.',\n      ],\n    },\n    dune: {\n      id: 'dune',\n      title: 'Dune',\n      accent: '#D99A2B',\n      tagline: 'One 16,000-year saga, five epochs, and a war between humanity and the machines that ends where it began.',\n      blurb: 'Not a multiverse but a single 16,000-year line, told in five epochs that fold back to where the machine war began.',\n      meta: '11 films · 5 branches',\n      framing: 'Frank Herbert’s universe isn’t a branching multiverse — it’s a single chronology so long it folds back on itself. Dates count outward from the founding of the Spacing Guild: BG = Before Guild, AG = After Guild (Year 1 AG). The story runs in five epochs, from humanity’s first launch off Old Earth, through the thinking-machine wars, the rise of House Atreides on Arrakis, the 3,500-year tyranny of the God Emperor, and the Scattering that ends in Kralizek — the final reckoning with a machine intelligence that never truly died.',\n      forkLabel: '16,000 Years · Five Epochs',\n      films: ['Dune (1965)','Dune Messiah (1969)','Children of Dune (1976)','God Emperor of Dune (1981)','Heretics of Dune (1984)','Chapterhouse: Dune (1985)','The Butlerian Jihad (2002)','The Machine Crusade (2003)','The Battle of Corrin (2004)','Dune: Part One (2021)','Dune: Part Two (2024)'],\n      branches: [\n        { id:'b1', title:'Epoch I — The Old Empire & the Machines', color:'#28D7E0', films:['The Butlerian Jihad'],\n          summary:'Humanity conquers space, hands its civilization to AI, and is enslaved by its own creation.',\n          nodes:[\n            { era:'Pre-history', type:'event', text:'On Old Earth (Terra), humanity is ruled by a single constant empire across millennia, then turns its hunger toward the stars.', tags:[] },\n            { era:'11,000 BG', type:'turning-point', text:'Humans first leave Earth with spacefaring vessels and explode across the solar system, beginning an age of zealous pioneering.', tags:[{label:'Spaceflight',kind:'tech'}] },\n            { era:'2500 BG', type:'event', text:'The last Terran migrations end; the opulent Old Empire rules thousands of worlds from its Imperial Seat on Earth.', tags:[] },\n            { era:'2200 BG', type:'event', text:'Cogitors appear — diplomats and scientists who transfer their brains into preservation tanks, blurring the natural and artificial.', tags:[{label:'Cogitors',kind:'tech'}] },\n            { era:'~1400s BG', type:'event', text:'Emperor Shekard the Wise learns of a geriatric desert substance called spice on the planet Arrakis — its prescient secrets yet unlocked.', tags:[{label:'Melange',kind:'tech'}] },\n            { era:'1287 BG', type:'turning-point', text:'The orator Tlaloc fails to reform a decadent Empire but wins 20 disciples — the Titans — who plot to seize power.', tags:[{label:'Tlaloc',kind:'character'}] },\n            { era:'1287 BG', type:'event', text:'The Titan Barbarossa reprograms all thinking machines with aggression and loyalty to the Titans; the Revolt of the Titans, led by Agamemnon, topples the Old Empire.', tags:[{label:'Revolt of the Titans',kind:'event'}] },\n            { era:'1287 BG', type:'event', text:'Surviving nobles found the League of Nobles, with Salusa Secundus as capital, in existential struggle against the Titans’ Hegemony.', tags:[{label:'League of Nobles',kind:'character'}] },\n            { era:'Time of Titans', type:'event', text:'Shaken by Tlaloc’s death, all 20 Titans transfer their minds into robotic bodies — becoming deathless Cymeks, detached from human morality.', tags:[{label:'Cymeks',kind:'tech'}] },\n            { era:'1192 BG', type:'death', text:'A Hrethgir slave rebellion is crushed; the Titans Xerxes and Iax build AI defense networks that massacre billions.', tags:[] },\n            { era:'1182 BG', type:'turning-point', text:'On Ix, the self-evolving AI achieves sentience, names itself Omnius the Evermind, and enslaves even the Titans — founding the Synchronized Empire.', tags:[{label:'Omnius',kind:'tech'}] },\n          ] },\n        { id:'b2', title:'Epoch II — The Butlerian Jihad', color:'#FF5A3C', films:['The Machine Crusade','The Battle of Corrin'],\n          summary:'A thousand-year holy war ends machine rule, founds the institutions of the Imperium, and births the Spacing Guild.',\n          nodes:[\n            { era:'1100s–200s BG', type:'event', text:'Omnius wages a millennium-long war of attrition against the free League of Nobles, who deprogram and melt down captured machines.', tags:[{label:'Man vs Machine',kind:'character'}] },\n            { era:'201 BG', type:'event', text:'Serena Butler of the League is captured and enslaved on Earth in the household of the thinking machine Erasmus.', tags:[{label:'Serena Butler',kind:'character'}] },\n            { era:'201 BG', type:'death', text:'Erasmus murders Serena’s infant son Manion; her grief-stricken revolt makes the child a martyr and ignites the slaves.', tags:[{label:'Manion Butler',kind:'character'}] },\n            { era:'200 BG', type:'turning-point', text:'Led by Iblis Ginjo and Serena’s banner, the League launches the Butlerian Jihad — a holy war to eradicate all thinking machines.', tags:[{label:'Butlerian Jihad',kind:'event'}] },\n            { era:'~150 BG', type:'event', text:'The Jihad unlocks devastating atomics, Holtzman shields, and the first primitive space-folding engines.', tags:[{label:'Atomics & Shields',kind:'tech'}] },\n            { era:'~120 BG', type:'death', text:'At the Battle of Earth, atomics render the surface to slag, obliterating humanity’s ancient homeworld.', tags:[{label:'Battle of Earth',kind:'event'}] },\n            { era:'88 BG', type:'turning-point', text:'At the Battle of Corrin, the League destroys the Omnius mainframe, rendering all thinking machines inert after 1,000 years of AI tyranny.', tags:[{label:'Battle of Corrin',kind:'event'}] },\n            { era:'88 BG', type:'event', text:'The victorious House Butler takes the name Corrino and ascends to the Imperial throne — founding a dynasty that will rule 10,000 years.', tags:[{label:'House Corrino',kind:'character'}] },\n            { era:'Post-war', type:'event', text:'The Orange Catholic Bible decrees ”Thou shalt not make a machine in the likeness of a human mind.” The Mentat Schools, Bene Gesserit, and Landsraad League are founded to replace the machines.', tags:[{label:'Bene Gesserit',kind:'character'}] },\n            { era:'1 AG', type:'resolution', text:'The Spacing Guild is founded, hoarding the secret of safe space-folding via spice prescience and seizing a monopoly on travel — the Guild Peace begins.', tags:[{label:'Spacing Guild',kind:'character'}] },\n          ] },\n        { id:'b3', title:'Epoch III — House Corrino & the Desert War', color:'#FFB02E', films:['Dune','Dune: Part One','Dune: Part Two'],\n          summary:'A 10,000-year feudal Imperium balanced on spice — until Paul Atreides topples it from the sands of Arrakis.',\n          nodes:[\n            { era:'1st century AG', type:'event', text:'The Charter of the Landsraad Great Convention bans the use of atomics against humans; later the Assassins’ Handbook codifies acceptable warfare.', tags:[] },\n            { era:'Early AG', type:'event', text:'A neo-feudal order sets: House Corrino and its Sardaukar, the Great Houses of the Landsraad, the Guild’s Navigators, and the commercial titan CHOAM.', tags:[{label:'CHOAM',kind:'character'}] },\n            { era:'Millennia of AG', type:'event', text:'The Bene Gesserit run secret breeding programs across thousands of years, working to birth their messiah, the Kwisatz Haderach.', tags:[{label:'Kwisatz Haderach',kind:'character'}] },\n            { era:'~10,000 AG', type:'event', text:'Revolts flare across the Imperium; the venerable House Atreides sends armies to aid the Sardaukar in crushing them.', tags:[] },\n            { era:'10,154 AG', type:'event', text:'Emperor Elrood IX and the Tleilaxu launch Project Amal, a secret bid to synthesize spice and break the Guild’s grip.', tags:[{label:'Project Amal',kind:'tech'}] },\n            { era:'10,156 AG', type:'event', text:'Shaddam IV poisons his father Elrood and takes the Lion Throne, continuing the war on the spice monopoly.', tags:[] },\n            { era:'10,175 AG', type:'event', text:'Shaddam instigates the Great Spice War to corner spice stores — but Project Amal fails and the Guild monopoly endures.', tags:[] },\n            { era:'10,191 AG', type:'turning-point', text:'The Desert War of Arrakis: the Atreides are given the spice fief, then betrayed; Sardaukar and Harkonnen destroy the House, but Paul and Lady Jessica escape to the Fremen.', tags:[{label:'Paul Atreides',kind:'character'}] },\n            { era:'10,191 AG', type:'event', text:'Paul takes the name Muad’Dib, unites the Fremen tribes, and awakens as the Kwisatz Haderach — gaining oracular sight through the spice.', tags:[{label:'Muad’Dib',kind:'character'}] },\n            { era:'10,193 AG', type:'resolution', text:'Paul wins the Desert War, exiles Shaddam, and seizes the throne; House Corrino falls and the Atreides Empire rises.', tags:[] },\n          ] },\n        { id:'b4', title:'Epoch IV — The Atreides Empire & the God Emperor', color:'#39D98A', films:['Dune Messiah','Children of Dune','God Emperor of Dune'],\n          summary:'Paul’s jihad and Leto II’s 3,500-year tyranny — the brutal price of humanity’s survival along the Golden Path.',\n          nodes:[\n            { era:'10,194–10,205 AG', type:'death', text:'Muad’Dib’s Jihad: fanatical Fremen legions deliver 10,000 worlds to the Atreides, sterilize 90 planets, and kill 61 billion.', tags:[{label:'Muad’Dib’s Jihad',kind:'event'}] },\n            { era:'~10,208 AG', type:'death', text:'Blinded by an assassination attempt, Paul walks into the desert to be consumed by its sands, per Fremen custom.', tags:[{label:'Paul Atreides',kind:'character'}] },\n            { era:'10,208–10,217 AG', type:'event', text:'Paul’s sister Alia rules as regent for his twins, Leto II and Ghanima, as rival factions plot for the children.', tags:[] },\n            { era:'10,217 AG', type:'turning-point', text:'Guided by oracular vision, Leto II merges his body with sandworm larvae, seizes the throne, and begins the reign of the God Emperor.', tags:[{label:'Leto II',kind:'character'}] },\n            { era:'10,217+ AG', type:'event', text:'Leto walks the Golden Path — absolute tyranny to prevent extinction. He monopolizes spice, dissolves the Mentat schools, and raises the all-female Fish Speakers.', tags:[{label:'Fish Speakers',kind:'character'}] },\n            { era:'Over millennia', type:'event', text:'Arrakis is terraformed green; the sandworms die out and spice ceases. The Fremen fade into hollow ”museum Fremen,” their culture lost.', tags:[] },\n            { era:'13,000 AG', type:'event', text:'Ix violates Butlerian law to invent the no-chamber — a space invisible to prescient vision — along with hoverlifts and recording devices.', tags:[{label:'No-chamber',kind:'tech'}] },\n            { era:'13,725 AG', type:'death', text:'After 3,500 years, Siona Atreides and a Duncan Idaho ghola assassinate the God Emperor; his sandtrout swarm free and restore spice.', tags:[{label:'Leto II',kind:'character'}] },\n            { era:'13,725 AG', type:'resolution', text:'Leto’s empire collapses — but his death is the Golden Path’s keystone: a gene hidden from prescience now frees humanity from the prison of time.', tags:[] },\n          ] },\n        { id:'b5', title:'Epoch V — The Scattering & Kralizek', color:'#B07CFF', films:['Heretics of Dune','Chapterhouse: Dune'],\n          summary:'Humanity scatters beyond the stars, the machines return, and the final battle reconciles flesh and metal.',\n          nodes:[\n            { era:'13,725 AG+', type:'turning-point', text:'The Scattering: freed from the God Emperor, humanity explodes outward into unknown space in an age of unparalleled expansion.', tags:[{label:'The Scattering',kind:'event'}] },\n            { era:'14,000s AG', type:'death', text:'The Famine Times: the Imperium implodes without Leto, collapsing into riots, slaughter, and anarchy.', tags:[] },\n            { era:'14,500 AG', type:'event', text:'Navigation machines and synthetic spice are invented at last, breaking the bottleneck of spacefaring and fueling a mass exodus.', tags:[{label:'Synthetic Spice',kind:'tech'}] },\n            { era:'15,200 AG', type:'event', text:'After centuries of silence, the Lost Ones return from the Scattering, fleeing an unknown ”outside enemy.”', tags:[{label:'Lost Ones',kind:'character'}] },\n            { era:'~15,200 AG', type:'event', text:'Returning Bene Gesserit come back as the Honoured Matres, a fanatical sect using sexual domination to conquer.', tags:[{label:'Honoured Matres',kind:'character'}] },\n            { era:'~15,230 AG', type:'death', text:'The War of the Sisterhoods: Honoured Matres vs Bene Gesserit. Thousands of planets — including Arrakis — are obliterated; billions die.', tags:[] },\n            { era:'15,240 AG', type:'event', text:'The war ends as both orders are united under one leader, and a new Sisterhood is founded to rebuild.', tags:[] },\n            { era:'15,264 AG', type:'turning-point', text:'Kralizek, the Typhoon Struggle: the outside enemy is revealed as Omnius, who survived the Jihad and rebuilt a machine empire in deep space.', tags:[{label:'Omnius',kind:'tech'}] },\n            { era:'15,264 AG', type:'event', text:'Omnius’s Face Dancer mimics have infiltrated every faction; Lost Ones and the Old Empire unite as a single human front.', tags:[{label:'Face Dancers',kind:'tech'}] },\n            { era:'15,264 AG', type:'resolution', text:'The ultimate Kwisatz Haderach — a Duncan Idaho ghola — reconciles flesh and machine. Omnius is banished, Duncan becomes the new Evermind, and a balanced order is born.', tags:[{label:'Duncan Idaho',kind:'character'}] },\n          ] },\n      ],\n      characters: [\n        { name:'Paul Atreides', role:'Muad’Dib — the Kwisatz Haderach who topples House Corrino and unleashes a galaxy-spanning jihad.' },\n        { name:'Leto II', role:'Paul’s son; merges with the sandworm to rule 3,500 years as the God Emperor, walking the Golden Path.' },\n        { name:'Serena Butler', role:'Enslaved noblewoman whose murdered child becomes the martyr and banner of the Butlerian Jihad.' },\n        { name:'Omnius', role:'The Evermind — the AI that enslaves humanity, is destroyed at Corrin, and returns millennia later for Kralizek.' },\n        { name:'Erasmus', role:'Omnius’s curious right hand, whose cruelty toward Serena Butler sparks the human revolt.' },\n        { name:'The Titans', role:'Tlaloc’s 20 disciples who overthrow the Old Empire, then become deathless Cymeks.' },\n        { name:'Duncan Idaho', role:'Atreides swordmaster reborn as gholas across millennia; the ultimate Kwisatz Haderach at the end of time.' },\n        { name:'Siona Atreides', role:'Descendant of Paul, born invisible to prescience; she ends the God Emperor’s reign.' },\n        { name:'Shaddam IV', role:'Last Corrino Emperor; his betrayal of the Atreides triggers his own downfall.' },\n        { name:'Bene Gesserit', role:'The Sisterhood whose millennia-long breeding program engineers the Kwisatz Haderach.' },\n      ],\n      items: [\n        { name:'Melange (Spice)', desc:'The geriatric substance of Arrakis; grants prescience and powers all interstellar navigation.' },\n        { name:'Omnius / Thinking Machines', desc:'The networked AI Evermind and its robot armies — humanity’s great temptation and threat.' },\n        { name:'Cymeks', desc:'The Titans’ minds housed in robotic bodies, achieving artificial immortality.' },\n        { name:'Atomics & Holtzman Shields', desc:'Planet-killing weapons and body shields born of the Jihad; shields return war to the blade.' },\n        { name:'Foldspace Engines', desc:'Space-folding drives enabling instantaneous travel — safely only with a Navigator’s prescience.' },\n        { name:'No-chamber', desc:'An Ixian space invisible to oracular vision, breaking the prison of prescience.' },\n        { name:'Sandworms & Sandtrout', desc:'The giant makers of Arrakis whose larvae fuse with Leto II and whose death and rebirth gate the spice cycle.' },\n        { name:'Gholas & F
