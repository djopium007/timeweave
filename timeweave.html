ace Dancers', desc:'Tleilaxu-grown clones of the dead and Omnius’s shape-shifting infiltrator-mimics.' },\n      ],\n      themes: [\n        'The eternal cycle of flesh and machine: Omnius is defeated at Corrin in 88 BG and returns over 15,000 years later for Kralizek — the saga’s true loop.',\n        'The Golden Path: Leto II’s monstrous 3,500-year tyranny is, paradoxically, the only road that saves the species from extinction.',\n        'The prison of prescience: the Kwisatz Haderach can see the future but not escape it — until a gene and the no-chamber make humanity invisible to the Oracle.',\n        'Spice is the axis of all power: navigation, prophecy, and longevity all flow from melange, making Arrakis the most valuable world in the universe.',\n        'BG / AG dating: all events count outward from the founding of the Spacing Guild in Year 1 AG — Before Guild and After Guild.',\n      ],\n    },\n    tenet: {\n      id: 'tenet',\n      title: 'Tenet',\n      accent: '#FF6B1F',\n      tagline: 'One film, one predestined loop, and four world-lines doubling back through it.',\n      blurb: 'One predestined loop, read four ways — the objective chronology first, then how each character threads back through it.',\n      meta: '1 films · 4 branches',\n      framing: 'Tenet isn’t a branching franchise — it’s a single ’this always happened’ loop. The confusion comes from inversion: people keep living forward while the world reverses around them, so the same events are crossed multiple times by inverted copies of the same person. The cleanest way to read it is by world-line — the objective chronology first, then how the Protagonist, Neil, and Kat & Sator each thread through it.',\n      forkLabel: 'The Turnstile · Inversion',\n      films: ['Tenet (2020)'],\n      branches: [\n        { id:'b1', title:'The Grand Loop — Objective Chronology', color:'#FF6B1F', films:['Tenet'],\n          summary:'The ’this always happened’ spine: how the Algorithm, Sator, and Tenet are all set in motion from the future.',\n          nodes:[\n            { era:'Far future', type:'turning-point', text:'A future scientist invents the Algorithm that can invert all of time. Horrified, she splits it into 9 artefacts, inverts and buries them in radioactive sites, and takes her own life to keep the secret.', tags:[{label:'Algorithm',kind:'tech'}] },\n            { era:'Far future', type:'event', text:'Future antagonists want to invert time to undo climate collapse — saving their world by destroying ours. They recruit a man in our past to gather the artefacts.', tags:[{label:'Future enemy',kind:'character'}] },\n            { era:'~1990s', type:'event', text:'After the Soviet collapse, young Andrei Sator digs plutonium at Stalsk-12 and unearths a buried cache of gold and instructions — his commission from the future.', tags:[] },\n            { era:'1990s–2020', type:'event', text:'Sator amasses power as a Russian oligarch, hunts the 9 artefacts, and builds turnstiles around the world. Radioactive digging gives him terminal pancreatic cancer.', tags:[{label:'Turnstile',kind:'tech'}] },\n            { era:'Future', type:'turning-point', text:'After the loop closes, the Protagonist founds the Tenet organisation and recruits Neil — seeding everything we watched.', tags:[{label:'Tenet',kind:'character'}] },\n            { era:'Present', type:'event', text:'The Protagonist is recruited and chases inverted bullet-casings from Kiev → Mumbai → London → Oslo → Amalfi → Tallinn.', tags:[] },\n            { era:'Present', type:'turning-point', text:'At the Battle of Stalsk-12, a temporal-pincer assault lets Tenet extract the assembled Algorithm seconds before it is sealed in the blast cave-in.', tags:[{label:'Pincer',kind:'tech'}] },\n            { era:'Present', type:'resolution', text:'The Algorithm is split three ways and re-hidden; Sator dies on his Vietnam yacht; the future’s plan never completes.', tags:[{label:'Loop closed',kind:'paradox'}] },\n            { era:'Epilogue', type:'resolution', text:'The Protagonist kills Priya to protect Kat and Max, completing Tenet’s clean-up. This always happened.', tags:[{label:'Always happened',kind:'paradox'}] },\n          ] },\n        { id:'b2', title:'The Protagonist’s Path', color:'#FF2A1F', films:['Tenet'],\n          summary:'His subjective experience — forward, then inverted, then forward again — to the freeway, Oslo, and Stalsk-12.',\n          nodes:[\n            { era:'Kiev', type:'turning-point', text:'On a CIA op at the Kiev Opera House, the Protagonist is saved by a masked man who inverts a bullet through his attacker — and runs off with a red keychain.', tags:[{label:'Inverted bullet',kind:'tech'}] },\n            { era:'Recruitment', type:'event', text:'Believed dead after passing a cyanide test, he is recruited into Tenet and learns objects are arriving inverted from the future.', tags:[{label:'Tenet',kind:'character'}] },\n            { era:'Mumbai', type:'event', text:'He traces the unique casings to Mumbai, meets Neil, and learns from Priya about oligarch Andrei Sator.', tags:[] },\n            { era:'London', type:'event', text:'He briefs Michael Crosby and plans to reach Sator through his estranged wife Kat, using a forged Goya she sold him.', tags:[] },\n            { era:'Oslo Freeport', type:'turning-point', text:'Crashing a plane to breach the vault, he and Neil fight a masked inverted figure in the turnstile room — unknowingly fighting his own future self.', tags:[{label:'Turnstile',kind:'tech'}] },\n            { era:'Amalfi / Tallinn', type:'event', text:'He offers Sator the 9th artefact (Plutonium-241) and runs the Tallinn highway heist — but an inverted Sator uses Kat as hostage to seize it.', tags:[] },\n            { era:'Tallinn turnstile', type:'turning-point', text:'Learning of the temporal pincer, he inverts to chase Sator down the freeway — and realises the flipping wreck he saw earlier was himself.', tags:[{label:'Pincer',kind:'tech'}] },\n            { era:'Oslo (inverted)', type:'event', text:'Still inverted, he returns to the Oslo vault, scuffles with his past self, and passes back through the turnstile to move forward again.', tags:[] },\n            { era:'Stalsk-12', type:'turning-point', text:'Leading the red team with Ives, he reaches the Algorithm but is trapped by a tripwire — until a dead blue soldier picks the lock and takes a bullet for him.', tags:[{label:'Pincer',kind:'tech'}] },\n            { era:'Future', type:'resolution', text:'He learns he is Tenet’s founder: in the future he will recruit Neil. For him the friendship is just beginning.', tags:[{label:'Bootstrap',kind:'paradox'}] },\n          ] },\n        { id:'b3', title:'Neil’s Path (Max → Neil)', color:'#28D7E0', films:['Tenet'],\n          summary:'The most tangled world-line: Kat’s son grows up, is recruited, then inverts back through the whole film — up to six Neils at once.',\n          nodes:[\n            { era:'Childhood', type:'event', text:'Max, Kat and Sator’s son, lives a normal boyhood — including the Vietnam yacht day where he glimpses his mother diving off the boat.', tags:[] },\n            { era:'Growing up', type:'event', text:'Raised bilingual (hence his Estonian), Max earns a master’s in physics, studying entropy — and learns the Protagonist saved his mother and the world.', tags:[] },\n            { era:'Future', type:'turning-point', text:'Recruited and mentored by the Protagonist, Max takes the last four letters of Maximilien, inverts them to Neil, and inverts back in time.', tags:[{label:'Identity',kind:'character'}] },\n            { era:'Kiev', type:'event', text:'An inverted Neil saves the Protagonist at the Opera House with the reversed bullet, then reverts to move forward.', tags:[{label:'Inverted',kind:'tech'}] },\n            { era:'Mumbai', type:'event', text:'Posing as a rookie, Neil already knows the Protagonist’s drink and laughs off inversion with positron/entropy quips.', tags:[] },\n            { era:'Oslo Freeport', type:'event', text:'On the other side of the turnstile fight, Neil chases the masked figure, unmasks the Protagonist, and lets him go.', tags:[] },\n            { era:'Tallinn → Oslo', type:'event', text:'After the heist he inverts with Kat back to the Oslo turnstile, lets the Protagonist enter first, then reverts all three to move forward in the past.', tags:[] },\n            { era:'Stalsk-12 (blue)', type:'turning-point', text:'Inverted on the blue team, he sees the tripwire too late, but reverts to pull the Protagonist and Ives — and the Algorithm — out of the collapsing tunnel.', tags:[{label:'Pincer',kind:'tech'}] },\n            { era:'Stalsk-12 (final)', type:'death', text:'Neil inverts one last time: he is the blue soldier who picks the lock and takes the bullet for the Protagonist. ’I’ll see you at the beginning, friend.’', tags:[{label:'Neil dies',kind:'character'}] },\n            { era:'All at once', type:'paradox', text:'During the battle Neil exists as a child, an inverted Kiev agent, a reverted operative, and multiple inverted/reverted battle copies — at least six Neils simultaneously.', tags:[{label:'Paradox',kind:'paradox'}] },\n          ] },\n        { id:'b4', title:'Kat & Sator’s Mirror', color:'#B07CFF', films:['Tenet'],\n          summary:'Husband and wife run nearly identical inverted journeys to the same Vietnam yacht — one to die, one to kill.',\n          nodes:[\n            { era:'1990s–2020', type:'event', text:'Sator rises on inverted gold, hunts the artefacts, and grows abusive as cancer and the future’s mission consume him.', tags:[] },\n            { era:'Marriage', type:'event', text:'He traps Kat with a forged Goya she unknowingly sold, using it to blackmail her and keep her from their son Max.', tags:[] },\n            { era:'Vietnam (past)', type:'event', text:'On the yacht, Kat sees a mystery woman dive overboard — a moment that will close her own loop.', tags:[] },\n            { era:'Amalfi', type:'event', text:'The Protagonist saves Sator from Kat’s attempt to drown him during a boat race, earning Sator’s trust.', tags:[] },\n            { era:'Tallinn', type:'death', text:'Sator assaults Kat, inverts, and drags her into his pincer to grab the artefact — leaving her dying of an inverted bullet wound.', tags:[{label:'Inverted wound',kind:'tech'}] },\n            { era:'Oslo turnstile', type:'turning-point', text:'Neil and the Protagonist invert Kat back to Oslo, revert to normal time, and heal her wound before it kills her.', tags:[] },\n            { era:'Vietnam (return)', type:'turning-point', text:'Inverted back to the yacht day, Kat poses as her past self, gains the trust of a Sator who thinks she’s harmless...', tags:[] },\n            { era:'Vietnam (return)', type:'resolution', text:'...then shows her scar and shoots Sator dead at his happiest moment, denying him a world-ending suicide — and becomes the diving woman she once saw.', tags:[{label:'Loop closed',kind:'paradox'}] },\n            { era:'Stalsk-12', type:'event', text:'Her kill is timed to the Battle of Stalsk-12: with Tenet foiling the future, Sator simply ’disappears’ as his body is towed away.', tags:[] },\n          ] },\n      ],\n      characters: [\n        { name:'The Protagonist', role:'Unnamed CIA agent who is recruited into — and will go on to found — Tenet; the loop’s anchor.' },\n        { name:'Neil (Max)', role:'The Protagonist’s closest ally; revealed as Kat’s grown son, sent back to die saving him.' },\n        { name:'Kat', role:'Sator’s estranged wife and Max’s mother; runs an inverted arc to kill Sator and free herself.' },\n        { name:'Andrei Sator', role:'Dying oligarch acting as the future’s agent, racing to assemble the Algorithm and end the world with him.' },\n        { name:'Priya', role:'Tenet’s Mumbai arms-dealer handler; ruthless, ultimately a loose end the Protagonist must cut.' },\n        { name:'Ives', role:'Tenet commando who explains the temporal pincer and leads the red team at Stalsk-12.' },\n        { name:'Max', role:'Kat and Sator’s son — and, per the film’s strong hint, the boy who becomes Neil.' },\n      ],\n      items: [\n        { name:'The Algorithm', desc:'A future device that inverts all of time, split into 9 artefacts and hidden across the past.' },\n        { name:'Turnstile', desc:'A two-sided machine that inverts a person’s or object’s entropy, reversing their flow through time.' },\n        { name:'Inverted bullets', desc:'Reversed-entropy rounds that fly back into the gun; the first clue that the future is reaching backward.' },\n        { name:'Temporal pincer', desc:'A tactic running one team forward and an inverted team backward through the same event to know its outcome.' },\n        { name:'Plutonium-241', desc:'The cover name for the 9th artefact, transported through Tallinn and fought over by both sides.' },\n        { name:'The Sator Square', desc:'The Latin palindrome (SATOR–AREPO–TENET–OPERA–ROTAS) seeding the film’s names and its mirrored structure.' },\n      ],\n      themes: [\n        '’This always happened’: Tenet is a Type-4 predestined loop — the time travel is what sets the story in motion, not a way to rewrite it.',\n        'Inversion, not jumping: you keep aging forward while the world reverses around you, so reaching the past takes real time spent inverted.',\n        'The Neil bootstrap: the Protagonist recruits Neil in the future; Neil inverts back to save him — a friendship with no beginning outside the loop.',\n        'Ignorance as ammunition: the plan only holds if characters don’t learn their own destinies and avoid contact with their other selves.',\n        'Mirrored world-lines: Protagonist/Neil and Kat/Sator run near-identical inverted journeys, echoing the palindromic Sator Square.',\n      ],\n    },\n    bttf: {\n      id: 'bttf',\n      title: 'Back to the Future',\n      accent: '#5AD1FF',\n      tagline: 'Three films, one DeLorean, and a timeline overwritten so many times even Doc needs a whiteboard.',\n      blurb: 'One timeline overwritten again and again — each trip to the past erases the present the travellers left behind.',\n      meta: '3 films · 4 branches',\n      framing: 'The Back to the Future trilogy isn’t a branching multiverse so much as a single timeline that keeps getting erased and rewritten. Each trip to the past overwrites the present the travelers came from, so the ’branches’ here are the successive realities Marty and Doc create: the world before any time travel, the improved 1985 that Marty’s first trip produces, the dystopian ’Hell Valley’ that Old Biff’s stolen almanac spawns, and the restored timeline that the 1885 adventure finally locks in. Read them top to bottom as a chain of overwrites, not as parallel worlds.',\n      forkLabel: 'Hill Valley · One Road, Rewritten',\n      films: ['Back to the Future (1985)','Back to the Future Part II (1989)','Back to the Future Part III (1990)'],\n      branches: [\n        { id:'b1', title:'The Original Timeline', color:'#FF5E5E', films:['Back to the Future','Back to the Future Part III'],\n          summary:'The world before Marty and Doc ever touch the past: a timid McFly family, a fatal 1885, and a Doc who dies in a parking lot.',\n          nodes:[\n            { era:'1885', type:'death', text:'New schoolteacher Clara Clayton arrives in Hill Valley; a snake spooks her horses and she plunges into Shonash Ravine and dies, never reaching her post. The gorge is renamed Clayton Ravine in her memory.', tags:[{label:'Clara Clayton',kind:'character'}] },\n            { era:'Fall 1955', type:'event', text:'A teenage George McFly spies on his crush Lorraine Baines from a tree, falls into the road, and is hit by Lorraine’s father’s car. Pitied into their home, George wins Lorraine, and they kiss at the Enchantment Under the Sea dance.', tags:[{label:'George & Lorraine',kind:'character'}] },\n            { era:'Nov 5, 1955', type:'turning-point', text:'Doc Brown slips hanging a clock, bangs his head, and envisions the flux capacitor — the device that makes time travel possible.', tags:[{label:'Flux Capacitor',kind:'tech'}] },\n            { era:'1985', type:'event', text:'The McFlys are downtrodden: George is bullied by his boss Biff Tannen, Lorraine is unhappy, and 17-year-old Marty dreams of rock stardom while best friend Doc finally perfects the DeLorean time machine.', tags:[{label:'DeLorean',kind:'tech'}] },\n            { era:'Oct 26, 1985', type:'death', text:'Doc test-runs the time machine at Twin Pines Mall using plutonium swindled from Libyan terrorists, who arrive and shoot him dead. Fleeing, Marty accidentally drives the DeLorean back to 1955.', tags:[{label:'Doc killed',kind:'event'}] },\n          ] },\n        { id:'b2', title:'The Improved 1985 (Lone Pine)', color:'#FFB02E', films:['Back to the Future'],\n          summary:'Marty’s 1955 trip accidentally rewrites his own family into a happier, more confident version — and saves Doc.',\n          nodes:[\n            { era:'Nov 1955', type:'paradox', text:'Marty crashes into a farmer’s pine tree on arrival and, in town, takes the car hit meant for George — so Lorraine falls for Marty (alias ’Calvin Klein’) instead of his father, threatening to erase Marty from existence.', tags:[{label:'Erasure paradox',kind:'paradox'}] },\n            { era:'Nov 1955', type:'event', text:'Marty plants the idea for George’s future sci-fi novel and gives Chuck Berry’s cousin an early earful of ’Johnny B. Goode’ — three years before it was written in the original timeline.', tags:[{label:'Bootstrap song',kind:'paradox'}] },\n            { era:'Nov 12, 1955', type:'turning-point', text:'At the Enchantment Under the Sea dance, George stands up to Biff and kisses Lorraine, securing his children’s existence. Marty harnesses the clock-tower lightning strike to power his return to 1985.', tags:[{label:'Turning point',kind:'event'}] },\n            { era:'Oct 26, 1985', type:'resolution', text:'Marty returns to a Lone Pine Mall (he flattened one of the twin pines) and a far better family: George is a published novelist, Biff details their cars, and Doc survives the Libyans by secretly wearing a bulletproof vest after taping back together Marty’s warning letter.', tags:[{label:'Doc survives',kind:'character'}] },\n          ] },\n        { id:'b3', title:'Biff’s Dystopia — Hell Valley (1985-A)', color:'#B07CFF', films:['Back to the Future Part II'],\n          summary:'A 2015 detour lets Old Biff hand his teenage self a sports almanac, spawning a corrupt alternate 1985 where Biff rules Hill Valley.',\n          nodes:[\n            { era:'Oct 21, 2015', type:'event', text:'Doc brings Marty and Jennifer forward to stop their future kids from a botched robbery with Griff Tannen. Marty buys a Grays Sports Almanac of results from 1950–2000; Doc makes him toss it.', tags:[{label:'Sports Almanac',kind:'tech'}] },\n            { era:'Oct 21, 2015', type:'turning-point', text:'Old Biff recognizes the flying DeLorean as a time machine, swipes the discarded almanac, and steals the car to deliver his fortune-making secret to the past.', tags:[{label:'Old Biff steals it',kind:'paradox'}] },\n            { era:'Nov 12, 1955', type:'paradox', text:'Old Biff gives the almanac to his teenage self, telling him to keep it hidden and to kill anyone — a kid or a ’wild-eyed old man’ — who comes asking about it. This seeds the dystopian branch.', tags:[{label:'Bootstrap gift',kind:'paradox'}] },\n            { era:'1985-A', type:'death', text:'Almanac-rich Biff builds BiffCo and a casino, murders George McFly, forces a marriage to Lorraine, and turns Hill Valley into a crime-ridden ’Hell Valley.’ The committed Doc-D and a dead George greet the returning travelers.', tags:[{label:'George murdered',kind:'event'}] },\n          ] },\n        { id:'b4', title:'The Restored Timeline (Eastwood Ravine)', color:'#39D98A', films:['Back to the Future Part II','Back to the Future Part III'],\n          summary:'Marty and Doc burn the almanac, then untangle an 1885 detour that ends with Doc choosing love and the timeline finally secured.',\n          nodes:[\n            { era:'Nov 12, 1955', type:'turning-point', text:'Re-entering 1955 alongside their first-movie selves, Marty and Doc chase the almanac through a car crash and finally burn it, restoring Biff to a harmless auto-detailer — but lightning then strikes the DeLorean and hurls Doc back to 1885.', tags:[{label:'Almanac burned',kind:'event'}] },\n            { era:'1885', type:'event', text:'Stranded with fried time circuits, Doc becomes a blacksmith, hides the DeLorean in a mineshaft, and mails Marty fix-it instructions plus an order not to come back for him.', tags:[{label:'Doc stranded',kind:'character'}] },\n            { era:'1885', type:'turning-point', text:'Doc saves Clara Clayton from her fatal fall and they fall in love — rewriting the ravine’s history. Marty, defying the letter, drives back to 1885 to rescue Doc from being shot by Buford ’Mad Dog’ Tannen.', tags:[{label:'Clara saved',kind:'character'}] },\n            { era:'1885', type:'turning-point', text:'Marty out-duels Mad Dog Tannen; he and Doc hijack a locomotive to push the fuel-less DeLorean to 88 mph. Doc leaps off to save Clara, and Marty rockets home alone.', tags:[{label:'Train push',kind:'tech'}] },\n            { era:'Oct 27, 1985', type:'resolution', text:'Marty returns for good to a timeline like the one he wanted — now with Eastwood Ravine — avoids the car crash that would have wrecked his music career, and watches Doc return in a flying steam-train time machine with Clara and sons Jules and Verne.', tags:[{label:'Timeline secured',kind:'event'}] },\n          ] },\n      ],\n      characters: [\n        { name:'Marty McFly', role:'The teen who keeps accidentally rewriting his own family while trying to get home.' },\n        { name:'Doc Brown', role:'Inventor of the flux capacitor; dies, survives, gets stranded in 1885, and ends up married to Clara.' },\n        { name:'George McFly', role:'Timid father turned confident novelist — and, in Biff’s dystopia, a murder victim.' },\n        { name:'Lorraine Baines', role:'Marty’s mother, whose 1955 affections nearly erase him from existence.' },\n        { name:'Biff Tannen', role:'Bully across generations; the almanac briefly makes him king of Hell Valley.' },\n        { name:'Clara Clayton', role:'The schoolteacher fated to die in the ravine until Doc saves her in the restored timeline.' },\n        { name:'Buford ’Mad Dog’ Tannen', role:'Biff’s 1885 ancestor; the gunslinger who shoots Doc in the original 1885.' },\n      ],\n      items: [\n        { name:'DeLorean DMC-12', desc:'Doc’s time machine; needs 1.21 gigawatts and 88 mph to jump.' },\n        { name:'Flux Capacitor', desc:'The Y-shaped device, glimpsed in Doc’s 1955 vision, that makes time travel possible.' },\n        { name:'Grays Sports Almanac', desc:'1950–2000 results book; Old Biff’s gift that creates the dystopian timeline.' },\n        { name:'Mr. Fusion', desc:'Home reactor retrofit that lets the DeLorean run on garbage instead of plutonium.' },\n        { name:'Hover Conversion', desc:'2015 upgrade that lets the DeLorean — and later a steam train — fly.' },\n      ],\n      themes: [\n        'Overwrite, not parallel: each trip erases the present the travelers left, so the ’branches’ are a chain of successive realities, not coexisting worlds.',\n        'The bootstrap loop of Johnny B. Goode: Marty learns the song from Chuck Berry, then plays it for Berry to copy — the tune has no original author.',\n        'The almanac paradox: Old Biff uses future knowledge to enrich his past self, spawning a timeline whose Biff could only exist because the almanac arrived from a future that the new timeline rewrites.',\n        'A ravine renamed three times: Clayton (Clara dies) → Shonash (its older name) → Eastwood (Marty’s fake death) traces the timeline’s edits in a single landmark.',\n        '’No one’s future is written’: Doc’s closing creed — the films treat time as endlessly editable rather than fixed.',\n      ],\n    },\n\n  };\n\n  comingSoon = [\n    { id:'apes', title:'Planet of the Apes', accent:'#7AA35A', tagline:'A reboot trilogy and an original loop that bends back to where it started.', meta:'9 films · 2 branches' },\n  ];\n\n  tagColor = { paradox:'#B69CFF', 'turning-point':'#FF5747', tech:'#54DBFF', resolution:'#3DDC84', death:'#FF4D7D', character:'#FFB454', event:'#9DB0C4' };\n\n  // ---------- helpers ----------\n  rgba(hex, a) {\n    const h = hex.replace('#','');\n    const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);\n    return `rgba(${r},${g},${b},${a})`;\n  }\n  initials(name) {\n    return name.replace(/[^a-zA-Z0-9 ].*/,'').split(/\\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase() || name.slice(0,2).toUpperCase();\n  }\n  markerStyle(type, color) {\n    const glow = (px)=>`0 0 ${px}px ${this.rgba(color,0.75)}`;\n    const base = { display:'inline-block', flex:'none' };\n    switch(type){\n      case 'turning-point': return {...base, width:'17px', height:'17px', borderRadius:'50%', background:color, border:'3px solid rgba(255,255,255,0.92)', boxShadow:glow(13)};\n      case 'paradox': return {...base, width:'13px', height:'13px', borderRadius:'3px', background:color, transform:'rotate(45deg)', boxShadow:glow(11)};\n      case 'death': return {...base, width:'15px', height:'15px', borderRadius:'50%', background:'transparent', border:`3px solid ${color}`, boxShadow:glow(9)};\n      case 'resolution': return {...base, width:'15px', height:'15px', borderRadius:'50%', background:color, boxShadow:`0 0 0 3px ${this.rgba(color,0.28)}, ${glow(10)}`};\n      default: return {...base, width:'11px', height:'11px', borderRadius:'50%', background:color, boxShadow:glow(7)};\n    }\n  }\n  branchChipStyle(color) {\n    return { display:'inline-flex', alignItems:'center', gap:'6px', padding:'5px 11px', borderRadius:'8px', fontFamily:\"'JetBrains Mono', monospace\", fontSize:'11px', fontWeight:'600', letterSpacing:'0.03em', color, background:this.rgba(color,0.13), border:`1px solid ${this.rgba(color,0.34)}` };\n  }\n  tagStyle(kind) {\n    const c = this.tagColor[kind] || this.tagColor.event;\n    return { display:'inline-flex', alignItems:'center', padding:'3px 9px', borderRadius:'7px', fontFamily:\"'JetBrains Mono', monospace\", fontSize:'10.5px', fontWeight:'600', letterSpacing:'0.05em', textTransform:'uppercase', color:c, background:this.rgba(c,0.13), border:`1px solid ${this.rgba(c,0.32)}` };\n  }\n  navBtn(active) {\n    return { padding:'9px 15px', borderRadius:'9px', border:'1px solid transparent', background: active?'rgba(255,255,255,0.08)':'transparent', color: active?'#fff':'#9DB0C4', fontFamily:\"'DM Sans', sans-serif\", fontWeight:'600', fontSize:'14px', cursor:'pointer', transition:'all .16s ease' };\n  }\n  tabBtn(active) {\n    return { padding:'8px 15px', borderRadius:'8px', border:'none', background: active?'rgba(255,255,255,0.14)':'transparent', color: active?'#fff':'#7a8696', fontFamily:\"'DM Sans', sans-serif\", fontWeight:'600', fontSize:'13.5px', cursor:'pointer', transition:'all .16s ease', whiteSpace:'nowrap' };\n  }\n  pickerBtn(active, color) {\n    const c = color || '#FF2A1F';\n    return { padding:'8px 14px', borderRadius:'9px', border:`1px solid ${active?this.rgba(c,0.6):'rgba(255,255,255,0.12)'}`, background: active?this.rgba(c,0.16):'rgba(255,255,255,0.02)', color: active?'#fff':'#9DB0C4', fontFamily:\"'DM Sans', sans-serif\", fontWeight:'600', fontSize:'13.5px', cursor:'pointer', transition:'all .16s ease' };\n  }\n  typeBtn(active) {\n    return { padding:'11px 16px', borderRadius:'10px', border:`1px solid ${active?'rgba(255,42,31,0.55)':'rgba(255,255,255,0.13)'}`, background: active?'rgba(255,42,31,0.14)':'rgba(255,255,255,0.02)', color: active?'#fff':'#9DB0C4', fontFamily:\"'DM Sans', sans-serif\", fontWeight:'600', fontSize:'14px', cursor:'pointer', transition:'all .16s ease' };\n  }\n\n  // ---------- poster silhouette art ----------\n  kindFor(id){ return ({terminator:'terminator',bttf:'bttf',dune:'dune',xmen:'xmen'})[id] || 'terminator'; }\n  artSVG(kind, accent) {\n    const a = (o) => this.rgba(accent, o);\n    const defs = `<defs><linearGradient id=\"g-${kind}\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"${a(0.62)}\"/><stop offset=\"0.5\" stop-color=\"${a(0.18)}\"/><stop offset=\"1\" stop-color=\"rgba(18,21,26,0.5)\"/><\u002FlinearGradient><filter id=\"f-${kind}\" x=\"-80%\" y=\"-80%\" width=\"260%\" height=\"260%\"><feGaussianBlur stdDeviation=\"7\"/><\u002Ffilter><\u002Fdefs>`;\n    let body = '';\n    if (kind === 'terminator') {\n      let teeth = '';\n      for (let i=0;i<7;i++){ const x=156+i*13; teeth += `<rect x=\"${x}\" y=\"207\" width=\"8\" height=\"40\" rx=\"1.5\"/>`; }\n      body = `<g opacity=\"0.95\"><path d=\"M200 42 C151 42 119 76 117 129 C116 151 122 169 133 183 L133 211 C133 225 143 234 157 236 L157 253 C157 267 169 275 183 277 L183 300 L217 300 L217 277 C231 275 243 267 243 253 L243 236 C257 234 267 225 267 211 L267 183 C278 169 284 151 283 129 C281 76 249 42 200 42 Z\" fill=\"url(#g-${kind})\" stroke=\"${a(0.4)}\" stroke-width=\"1.2\"/><g fill=\"#070809\"><path d=\"M148 117 L188 130 L182 164 L150 152 Z\"/><path d=\"M252 117 L212 130 L218 164 L250 152 Z\"/><path d=\"M200 156 L189 187 L211 187 Z\"/><rect x=\"150\" y=\"204\" width=\"100\" height=\"46\" rx=\"5\"/><\u002Fg><g fill=\"url(#g-${kind})\">${teeth}<\u002Fg><rect x=\"196\" y=\"206\" width=\"8\" height=\"44\" fill=\"#070809\"/><circle cx=\"232\" cy=\"142\" r=\"11\" fill=\"${accent}\" filter=\"url(#f-${kind})\" opacity=\"0.85\"/><circle cx=\"232\" cy=\"142\" r=\"5\" fill=\"#ffe3de\"/><\u002Fg>`;\n    } else if (kind === 'bttf') {\n      body = `<g opacity=\"0.95\"><g fill=\"url(#g-${kind})\"><path d=\"M0 212 L150 221 L150 229 L0 229 Z\"/><path d=\"M0 236 L150 240 L150 249 L0 251 Z\"/><\u002Fg><circle cx=\"42\" cy=\"221\" r=\"5\" fill=\"${accent}\" filter=\"url(#f-${kind})\"/><circle cx=\"92\" cy=\"227\" r=\"4\" fill=\"${accent}\" filter=\"url(#f-${kind})\"/><path d=\"M120 235 L150 200 L250 196 L300 214 L356 226 Q372 230 372 244 L372 252 Q372 260 362 260 L120 260 Q108 260 108 250 L108 244 Q108 235 120 235 Z\" fill=\"url(#g-${kind})\" stroke=\"${a(0.35)}\" stroke-width=\"1\"/><path d=\"M158 198 L176 150 L214 150 L236 198 Z\" fill=\"url(#g-${kind})\" stroke=\"${a(0.4)}\" stroke-width=\"1\"/><path d=\"M168 196 L182 162 L208 162 L224 196 Z\" fill=\"#070809\"/><circle cx=\"150\" cy=\"262\" r=\"22\" fill=\"#0a0c10\" stroke=\"${a(0.45)}\" stroke-width=\"3\"/><circle cx=\"312\" cy=\"262\" r=\"22\" fill=\"#0a0c10\" stroke=\"${a(0.45)}\" stroke-width=\"3\"/><circle cx=\"150\" cy=\"262\" r=\"7\" fill=\"url(#g-${kind})\"/><circle cx=\"312\" cy=\"262\" r=\"7\" fill=\"url(#g-${kind})\"/><\u002Fg>`;\n    } else if (kind === 'dune') {\n      let mteeth='';\n      for(let i=0;i<10;i++){ const ang=(i/10)*Math.PI*2; const x=268+Math.cos(ang)*20; const y=100+Math.sin(ang)*20; mteeth+=`<circle cx=\"${x.toFixed(1)}\" cy=\"${y.toFixed(1)}\" r=\"2.4\" fill=\"url(#g-${kind})\"/>`; }\n      body = `<g opacity=\"0.92\"><circle cx=\"80\" cy=\"72\" r=\"30\" fill=\"${a(0.5)}\" filter=\"url(#f-${kind})\"/><circle cx=\"130\" cy=\"92\" r=\"15\" fill=\"${a(0.32)}\" filter=\"url(#f-${kind})\"/><path d=\"M306 300 C296 244 292 200 270 168 C254 146 258 122 268 106\" fill=\"none\" stroke=\"url(#g-${kind})\" stroke-width=\"44\" stroke-linecap=\"round\"/><circle cx=\"268\" cy=\"100\" r=\"27\" fill=\"url(#g-${kind})\"/>${mteeth}<circle cx=\"268\" cy=\"100\" r=\"16\" fill=\"#070809\"/><path d=\"M0 300 L0 256 C70 240 130 274 210 256 C280 240 340 262 400 248 L400 300 Z\" fill=\"url(#g-${kind})\"/><g fill=\"#06070A\"><rect x=\"150\" y=\"240\" width=\"5\" height=\"17\" rx=\"2.5\"/><circle cx=\"152.5\" cy=\"237\" r=\"3.4\"/><rect x=\"170\" y=\"243\" width=\"5\" height=\"15\" rx=\"2.5\"/><circle cx=\"172.5\" cy=\"240\" r=\"3.2\"/><\u002Fg><\u002Fg>`;\n    } else if (kind === 'xmen') {\n      body = `<g opacity=\"0.95\"><circle cx=\"200\" cy=\"166\" r=\"112\" fill=\"none\" stroke=\"url(#g-${kind})\" stroke-width=\"20\"/><path d=\"M118 78 L152 76 L288 250 L254 258 Z\" fill=\"url(#g-${kind})\"/><path d=\"M282 78 L248 76 L112 250 L146 258 Z\" fill=\"url(#g-${kind})\"/><circle cx=\"200\" cy=\"166\" r=\"18\" fill=\"url(#g-${kind})\"/><\u002Fg>`;\n    }\n    return `<svg viewBox=\"0 0 400 320\" width=\"100%\" height=\"100%\" preserveAspectRatio=\"xMidYMax meet\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">${defs}${body}<\u002Fsvg>`;\n  }\n  makeArtEl(kind, accent, variant, muted) {\n    const html = this.artSVG(kind, accent);\n    const pos = variant === 'hero'\n      ? { right:'-1%', bottom:'-7%', height:'120%', width:'60%' }\n      : { right:'-10%', bottom:'-12%', height:'134%', width:'68%' };\n    return React.createElement('div', { 'aria-hidden':'true', style:{ position:'absolute', pointerEvents:'none', opacity: muted?0.34:(variant==='hero'?0.6:0.5), filter: muted?'saturate(0.55)':'none', ...pos }, dangerouslySetInnerHTML:{ __html: html } });\n  }\n\n  // ---------- actions ----------\n  goHub = () => { this.setState({ screen:'hub' }); this.toTop(); };\n  goExplore = () => { this.setState({ screen:'timeline' }); this.toTop(); };\n  goContribute = (prefill) => { this.setState(s=>({ screen:'contribute', submitted:false, form: typeof prefill==='string'? {...s.form, type:'new', name:prefill} : s.form })); this.toTop(); };\n  toTop = () => { try { window.scrollTo({top:0,behavior:'auto'}); } catch(e){} };\n\n  openFranchise = (id) => {\n    if (this.data[id]) { this.setState({ screen:'timeline', activeId:id, filter:'all', collapsed:{}, view:'rail' }); this.toTop(); }\n  };\n  comingSoonClick = (title) => {\n    this.showToast({ kind:'soon', title:'Map not live yet', body:`${title} is on the roadmap — want to help build it?`, actionLabel:'Contribute', action:()=>this.goContribute(title) });\n  };\n\n  onSearchInput = (e) => this.setState({ search: e.target.value });\n  onSearchKey = (e) => { if (e.key==='Enter') this.submitSearch(); };\n  tryTerminator = () => { this.setState({ search:'Terminator' }, ()=>this.submitSearch()); };\n  submitSearch = () => {\n    const q = (this.state.search||'').trim().toLowerCase();\n    if (!q) return;\n    const live = Object.values(this.data).find(f => f.title.toLowerCase().includes(q) || q.includes(f.title.toLowerCase()));\n    if (live) { this.openFranchise(live.id); return; }\n    const soon = this.comingSoon.find(f => f.title.toLowerCase().includes(q) || q.includes(f.title.toLowerCase().split(' ')[0]));\n    if (soon) { this.comingSoonClick(soon.title); return; }\n    this.showToast({ kind:'unknown', title:`No map for \\u201C${this.state.search.trim()}\\u201D yet`, body:'Be the first to chart it.', actionLabel:'Suggest it', action:()=>this.goContribute(this.state.search.trim()) });\n  };\n\n  setFilter = (id) => this.setState({ filter:id });\n  toggleBranch = (id) => this.setState(s => ({ collapsed: {...s.collapsed, [id]: !s.collapsed[id] } }));\n  setRailView = () => this.setState({ view:'rail' });\n  setTreeView = () => this.setState({ view:'tree' });\n\n  setTypeNew = () => this.setState(s=>({ form:{...s.form, type:'new'} }));\n  setTypeEdit = () => this.setState(s=>({ form:{...s.form, type:'edit'} }));\n  onFormName = (e) => { const v=e.target.value; this.setState(s=>({ form:{...s.form, name:v} })); };\n  onFormHandle = (e) => { const v=e.target.value; this.setState(s=>({ form:{...s.form, handle:v} })); };\n  onFormNote = (e) => { const v=e.target.value; this.setState(s=>({ form:{...s.form, note:v} })); };\n  submitContribute = () => {\n    const f = this.state.form;\n    if (!f.name.trim()) { this.showToast({ kind:'unknown', title:'Add a title first', body:'Tell us which franchise this is about.' }); return; }\n    this.setState(s=>({ submitted:true, queuePos: 30 + Math.floor(Math.random()*40) }));\n    this.toTop();\n  };\n  resetContribute = () => this.setState({ submitted:false, form:{ type:'new', name:'', handle:'', note:'' } });\n\n  toastTimer = null;\n  showToast = (t) => {\n    this.setState({ toast:t });\n    if (this.toastTimer) clearTimeout(this.toastTimer);\n    this.toastTimer = setTimeout(()=>this.setState({ toast:null }), 6000);\n  };\n  dismissToast = () => { if (this.toastTimer) clearTimeout(this.toastTimer); this.setState({ toast:null }); };\n\n  // ---------- render ----------\n  renderVals() {\n    const s = this.state;\n    const ambientMotion = this.props.ambientMotion ?? true;\n    const compact = (this.props.density ?? 'cozy') === 'compact';\n    const accent = this.props.accent ?? '#FF2A1F';\n    const a = this.data[s.activeId] || this.data.terminator;\n    const nodeGap = compact ? '14px' : '22px';\n\n    // featured (hub spotlight)\n    const featured = {\n      title: a.title, meta: a.meta, tagline: a.tagline, blurb: a.blurb,\n      onOpen: () => this.openFranchise(a.id),\n      art: this.makeArtEl(this.kindFor(a.id), a.accent, 'hero'),\n      branchChips: a.branches.map(b => ({ label: b.title, style: this.branchChipStyle(b.color) })),\n    };\n\n    // hub grid\n    const liveCards = Object.values(this.data).map(f => ({\n      id: f.id, title: f.title, tagline: f.tagline, meta: f.meta,\n      badgeLabel: 'Live', cta: 'Open →',\n      onOpen: () => this.openFranchise(f.id),\n      art: this.makeArtEl(this.kindFor(f.id), f.accent, 'card', false),\n      cardStyle: { position:'relative', display:'flex', flexDirection:'column', borderRadius:'16px', overflow:'hidden', border:'1px solid rgba(255,255,255,0.1)', background:'#0c0e13', cursor:'pointer', transition:'transform .18s ease, border-color .18s ease' },\n      posterStyle: { position:'relative', minHeight:'150px', padding:'18px', display:'flex', alignItems:'flex-end', background:`radial-gradient(125% 130% at 82% 96%, ${this.rgba(f.accent,0.32)}, transparent 58%), linear-gradient(160deg, #100a09, #08090c)` },\n      badgeStyle: { position:'absolute', top:'14px', right:'14px', display:'inline-flex', alignItems:'center', gap:'6px', padding:'4px 10px', borderRadius:'999px', fontFamily:\"'JetBrains Mono', monospace\", fontSize:'10px', fontWeight:'700', letterSpacing:'0.1em', textTransform:'uppercase', color:'#3DDC84', background:this.rgba('#3DDC84',0.14), border:`1px solid ${this.rgba('#3DDC84',0.4)}` },\n      ctaStyle: { fontFamily:\"'Oswald', sans-serif\", fontWeight:'500', fontSize:'13px', letterSpacing:'0.05em', textTransform:'uppercase', color:'#FF7A6E' },\n    }));\n    const soonCards = this.comingSoon.map(f => ({\n      id: f.id, title: f.title, tagline: f.tagline, meta: f.meta,\n      badgeLabel: 'Coming soon', cta: 'Help build',\n      onOpen: () => this.comingSoonClick(f.title),\n      art: this.makeArtEl(this.kindFor(f.id), f.accent, 'card', true),\n      cardStyle: { position:'relative', display:'flex', flexDirection:'column', borderRadius:'16px', overflow:'hidden', border:'1px dashed rgba(255,255,255,0.14)', background:'#0a0c10', cursor:'pointer', transition:'transform .18s ease, border-color .18s ease' },\n      posterStyle: { position:'relative', minHeight:'150px', padding:'18px', display:'flex', alignItems:'flex-end', background:`radial-gradient(125% 130% at 82% 96%, ${this.rgba(f.accent,0.16)}, transparent 60%), linear-gradient(160deg, #0e0f13, #08090b)` },\n      badgeStyle: { position:'absolute', top:'14px', right:'14px', display:'inline-flex', alignItems:'center', padding:'4px 10px', borderRadius:'999px', fontFamily:\"'JetBrains Mono', monospace\", fontSize:'10px', fontWeight:'700', letterSpacing:'0.1em', textTransform:'uppercase', color:'#9DB0C4', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.16)' },\n      ctaStyle: { fontFamily:\"'Oswald', sans-serif\", fontWeight:'500', fontSize:'13px', letterSpacing:'0.05em', textTransform:'uppercase', color:'#9DB0C4' },\n    }));\n    const franchises = [...liveCards, ...soonCards];\n    const franchiseCount = `${liveCards.length} live · ${soonCards.length} coming soon`;\n\n    const steps = [\n      { num:'01', title:'Search a title', body:'Type any film. We route known franchises straight to their branch map.' },\n      { num:'02', title:'Follow the forks', body:'Each reboot or time-loop becomes its own colored branch. Filter to isolate one thread.' },\n      { num:'03', title:'Read the paradoxes', body:'Color-coded nodes flag turning points, deaths and the loops that fold back on themselves.' },\n    ];\n\n    // timeline: filters\n    const filterButtons = [\n      { id:'all', label:'All', onClick:()=>this.setFilter('all'), style: this.pickerBtn(s.filter==='all', accent) },\n      ...a.branches.map(b => ({ id:b.id, label:b.title, onClick:()=>this.setFilter(b.id), style: this.pickerBtn(s.filter===b.id, b.color) })),\n    ];\n\n    const isTree = s.view === 'tree';\n    const branchesContainerStyle = isTree\n      ? { display:'flex', gap:'16px', overflowX:'auto', paddingBottom:'12px', alignItems:'flex-start' }\n      : { display:'flex', flexDirection:'column', gap:'16px' };\n\n    const branches = a.branches.map(b => {\n      const dimmed = s.filter !== 'all' && s.filter !== b.id;\n      const collapsed = !isTree && !!s.collapsed[b.id];\n      const open = isTree || !collapsed;\n      return {\n        id: b.id, title: b.title, summary: b.summary, color: b.color,\n        filmsLabel: b.films.join('  ·  '),\n        nodeGap,\n        showChevron: !isTree,\n        showConnector: isTree,\n        onToggle: isTree ? (()=>{}) : (()=>this.toggleBranch(b.id)),\n        wrapperStyle: {\n          position:'relative',\n          flex: isTree ? '0 0 320px' : 'none',\n          width: isTree ? '320px' : 'auto',\n          borderRadius:'16px',\n          border:`1px solid ${this.rgba(b.color, dimmed?0.12:0.32)}`,\n          background:`linear-gradient(180deg, ${this.rgba(b.color, dimmed?0.02:0.06)}, rgba(11,13,17,0.85))`,\n          opacity: dimmed ? 0.4 : 1,\n          filter: dimmed ? 'saturate(0.5)' : 'none',\n          transition:'opacity .25s ease, filter .25s ease, border-color .25s ease',\n          overflow:'hidden',\n        },\n        connectorStyle: { position:'absolute', top:'-24px', left:'50%', width:'1px', height:'24px', background:`linear-gradient(${b.color}, ${this.rgba(b.color,0.1)})` },\n        headerStyle: {\n          display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px',\n          padding: isTree ? '16px 16px' : '18px 22px', cursor: isTree?'default':'pointer',\n          background: this.rgba(b.color, 0.05), borderBottom: open?`1px solid ${this.rgba(b.color,0.18)}`:'1px solid transparent',\n          transition:'background .16s ease',\n        },\n        dotStyle: { flex:'none', width:'13px', height:'13px', borderRadius:'50%', background:b.color, boxShadow:`0 0 12px ${this.rgba(b.color,0.85)}` },\n        chevronStyle: { flex:'none', fontSize:'20px', lineHeight:'1', color:this.rgba(b.color,0.9), transform: collapsed?'rotate(-90deg)':'rotate(0deg)', transition:'transform .25s ease' },\n        gridStyle: { display:'grid', gridTemplateRows: open?'1fr':'0fr', transition:'grid-template-rows .3s ease' },\n        bodyPadStyle: { padding: isTree ? '16px' : '20px 22px 24px' },\n        railLineStyle: { position:'absolute', left:'16px', top:'6px', bottom:'6px', width:'2px', background:`linear-gradient(${b.color}, ${this.rgba(b.color,0.25)})`, boxShadow:`0 0 10px ${this.rgba(b.color,0.5)}` },\n        nodes: b.nodes.map(n => ({\n          era: n.era, text: n.text, type: n.type,\n          markerStyle: this.markerStyle(n.type, b.color),\n          eraStyle: { display:'inline-block', fontFamily:\"'JetBrains Mono', monospace\", fontSize:'11.5px', fontWeight:'700', letterSpacing:'0.06em', color:b.color, background:this.rgba(b.color,0.1), border:`1px solid ${this.rgba(b.color,0.28)}`, padding:'3px 9px', borderRadius:'6px' },\n          hasTags: (n.tags||[]).length > 0,\n          tags: (n.tags||[]).map(t => ({ label:t.label, style:this.tagStyle(t.kind) })),\n        })),\n      };\n    });\n\n    const characters = a.characters.map(c => ({\n      name:c.name, role:c.role, initials:this.initials(c.name),\n      avatarStyle: { flex:'none', width:'40px', height:'40px', borderRadius:'11px', display:'grid', placeItems:'center', background:`linear-gradient(135deg, ${this.rgba(a.accent,0.3)}, rgba(255,255,255,0.04))`, border:'1px solid rgba(255,255,255,0.12)', fontFamily:\"'Oswald', sans-serif\", fontWeight:'600', fontSize:'14px', letterSpacing:'0.02em', color:'#E9EDF3' },\n    }));\n\n    // contribute labels\n    const isNew = s.form.type === 'new';\n    const submitMessage = isNew\n      ? `Thanks — “${s.form.name||'your franchise'}” has joined the queue. An editor will weave it into a branch map and let you know.`\n      : `Thanks — your edit to “${s.form.name||'that map'}” is queued for review. We’ll merge it once a maintainer confirms.`;\n\n    // crest for timeline header\n    const crestStyle = { flex:'none', width:'60px', height:'60px', borderRadius:'15px', display:'grid', placeItems:'center', background:`radial-gradient(120% 120% at 30% 0%, ${this.rgba(a.accent,0.6)}, ${this.rgba(a.accent,0.08)})`, border:`1px solid ${this.rgba(a.accent,0.45)}`, boxShadow:`0 0 24px -6px ${this.rgba(a.accent,0.7)}` };\n\n    // toast styling\n    let toast = null;\n    if (s.toast) {\n      const t = s.toast;\n      const dotColor = t.kind==='soon' ? '#F5A623' : (t.kind==='unknown' ? '#B69CFF' : '#3DDC84');\n      toast = {\n        title:t.title, body:t.body, hasAction: !!t.actionLabel, actionLabel:t.actionLabel, onAction:t.action,\n        dotStyle:{ flex:'none', width:'10px', height:'10px', borderRadius:'50%', background:dotColor, boxShadow:`0 0 12px ${dotColor}` },\n      };\n    }\n\n    return {\n      ambientMotion, stillAmbient: !ambientMotion,\n      isHub: s.screen==='hub', isTimeline: s.screen==='timeline', isContribute: s.screen==='contribute',\n      navHubStyle: this.navBtn(s.screen==='hub'),\n      navExploreStyle: this.navBtn(s.screen==='timeline'),\n      goHub:this.goHub, goExplore:this.goExplore, goContribute:()=>this.goContribute(),\n      // hub\n      search:s.search, onSearchInput:this.onSearchInput, onSearchKey:this.onSearchKey, submitSearch:this.submitSearch, tryTerminator:this.tryTerminator,\n      featured, franchises, franchiseCount, steps,\n      // timeline\n      active: { title:a.title, meta:a.meta, framing:a.framing, initials:this.initials(a.title), crestStyle, forkLabel:a.forkLabel, branchCount:a.branches.length },\n      filterButtons,\n      railTabStyle:this.tabBtn(!isTree), treeTabStyle:this.tabBtn(isTree),\n      setRailView:this.setRailView, setTreeView:this.setTreeView,\n      isTree, branchesContainerStyle, branches,\n      characters, items:a.items, themes:a.themes,\n      // contribute\n      notSubmitted: !s.submitted, submitted: s.submitted,\n      form:s.form,\n      typeNewStyle:this.typeBtn(isNew), typeEditStyle:this.typeBtn(!isNew),\n      setTypeNew:this.setTypeNew, setTypeEdit:this.setTypeEdit,\n      onFormName:this.onFormName, onFormHandle:this.onFormHandle, onFormNote:this.onFormNote,\n      submitContribute:this.submitContribute, resetContribute:this.resetContribute,\n      nameFieldLabel: isNew ? 'Franchise title' : 'Which map are you editing?',\n      noteFieldLabel: isNew ? 'Outline the branches' : 'What needs fixing?',\n      submitMessage, queuePosition:s.queuePos,\n      // toast\n      toast, dismissToast:this.dismissToast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
